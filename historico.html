<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; min-height: 100dvh; margin: 0; font-family: sans-serif; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .card-pista { background: linear-gradient(180deg, #111 0%, #000 100%); border: 1px solid #222; }
        .row-ranking:nth-child(1) .posicao { color: #fbbf24; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="app-container" class="p-6">
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="text-zinc-500 font-bold uppercase text-[10px] border border-zinc-900 px-4 py-2 rounded-xl">← Voltar</a>
            <select id="filtroPista" onchange="renderizar()" class="bg-zinc-900 text-white font-bold text-[10px] p-2 rounded-xl border border-zinc-800 outline-none uppercase">
                <option value="TODAS">Todas as Pistas</option>
            </select>
        </div>

        <div id="listaTreinos" class="space-y-8 max-w-2xl mx-auto pb-20">
            <div class="text-center text-zinc-800 font-bold uppercase italic text-xs">Carregando...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let dadosLocais = {};

        onSnapshot(query(collection(db, "treinos")), (snapshot) => {
            dadosLocais = {};
            const select = document.getElementById('filtroPista');
            const pistasSet = new Set();

            snapshot.forEach(doc => {
                const t = doc.data();
                if (!t.voltas || t.voltas.length === 0) return;
                pistasSet.add(t.pista);
                const melhor = t.voltas.sort()[0];
                if (!dadosLocais[t.pista]) dadosLocais[t.pista] = {};
                if (!dadosLocais[t.pista][t.piloto] || melhor < dadosLocais[t.pista][t.piloto]) {
                    dadosLocais[t.pista][t.piloto] = melhor;
                }
            });

            // Atualiza o select
            const val = select.value;
            select.innerHTML = '<option value="TODAS">Todas as Pistas</option>';
            Array.from(pistasSet).sort().forEach(p => {
                select.innerHTML += `<option value="${p}">${p.toUpperCase()}</option>`;
            });
            select.value = val;
            renderizar();
        });

        window.renderizar = function() {
            const container = document.getElementById('listaTreinos');
            const filtro = document.getElementById('filtroPista').value;
            container.innerHTML = '';

            Object.keys(dadosLocais).forEach(pista => {
                if (filtro !== "TODAS" && filtro !== pista) return;
                
                let html = `<div class="card-pista rounded-[2.5rem] overflow-hidden mb-6">
                    <div class="bg-zinc-900/50 p-6 border-b border-zinc-800"><h3 class="text-xl font-black italic uppercase text-yellow-400">${pista}</h3></div>
                    <div class="p-4 space-y-2">`;

                Object.entries(dadosLocais[pista]).sort((a,b) => a[1].localeCompare(b[1])).forEach(([piloto, tempo], i) => {
                    html += `<div class="flex justify-between items-center p-4 bg-zinc-900/30 rounded-2xl">
                        <div class="flex items-center gap-4"><span class="font-black italic w-6">${i+1}º</span><span class="font-bold uppercase italic text-zinc-200">${piloto}</span></div>
                        <div class="text-right"><div class="text-[8px] text-zinc-600 font-bold uppercase italic">Best Lap</div><div class="text-lg font-black font-mono">${tempo}</div></div>
                    </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
        }
    </script>
</body>
</html>
