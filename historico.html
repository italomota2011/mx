<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Histórico - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; }

            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }

        .list-box { background: #111; border: 1px solid #222; height: 75%; overflow-y: auto; }

        </div>
        <div class="w-full max-w-4xl list-box rounded-[2rem] p-6 shadow-2xl">
            <div id="lista" class="space-y-4">
                <div class="text-center py-20 text-gray-600 uppercase tracking-widest text-xs">Buscando dados no Firebase...</div>
            </div>
        </div>
