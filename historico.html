<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; min-height: 100dvh; margin: 0; font-family: sans-serif; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .card-pista { background: linear-gradient(180deg, #111 0%, #000 100%); border: 1px solid #222; }
        .btn-telemetria:active { background-color: rgba(255, 255, 255, 0.1); }
        select { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="app-container" class="p-6">
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="text-zinc-500 font-bold uppercase text-[10px] border border-zinc-900 px-4 py-2 rounded-xl active:bg-zinc-900">← Menu</a>
            
            <div class="relative">
                <select id="filtroPista" onchange="renderizar()" class="bg-zinc-900 text-white font-bold text-[10px] py-2 px-6 rounded-xl border border-zinc-800 outline-none uppercase pr-8">
                    <option value="TODAS">Todas as Pistas</option>
                </select>
                <div class="absolute right-2 top-2.5 pointer-events-none text-zinc-600 text-[8px]">▼</div>
            </div>
        </div>

        <div id="listaTreinos" class="space-y-6 max-w-3xl mx-auto pb-20">
            <div id="msgStatus" class="text-center text-zinc-800 font-bold uppercase italic text-[10px] mt-20 animate-pulse">
                Sincronizando com a nuvem...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let dadosRanking = {};

        // Escuta a coleção "treinos" em tempo real
        const q = query(collection(db, "treinos"));

        onSnapshot(q, (snapshot) => {
            console.log("Total de treinos no Firebase:", snapshot.size);
            dadosRanking = {};
            const select = document.getElementById('filtroPista');
            const pistasSet = new Set();
            const valAnterior = select.value;

            if (snapshot.empty) {
                document.getElementById('msgStatus').innerText = "Nenhum treino registrado ainda.";
                return;
            }

            snapshot.forEach(doc => {
                const t = doc.data();
                
                // Validação básica: Nome da pista e se existem voltas
                const nomePistaRaw = t.pista || "PISTA DESCONHECIDA";
                const nomePista = nomePistaRaw.toUpperCase();
                const voltas = t.voltas && Array.isArray(t.voltas) ? t.voltas : [];

                if (voltas.length > 0) {
                    pistasSet.add(nomePista);

                    // Pega a melhor volta daquela sessão
                    const melhorVoltaSessao = [...voltas].sort()[0];

                    // Tratamento de Data (Firebase Timestamp ou String)
                    let dataFormatada = "00/00/0000";
                    if (t.data) {
                        try {
                            const dt = t.data.toDate ? t.data.toDate() : new Date(t.data);
                            dataFormatada = dt.toLocaleDateString('pt-BR');
                        } catch(e) { console.error("Erro na data:", e); }
                    }

                    if (!dadosRanking[nomePista]) dadosRanking[nomePista] = [];

                    dadosRanking[nomePista].push({
                        id: doc.id,
                        piloto: t.piloto || "Piloto S/N",
                        tempo: melhorVoltaSessao,
                        data: dataFormatada
                    });
                }
            });

            // Atualiza o filtro de pistas
            select.innerHTML = '<option value="TODAS">Todas as Pistas</option>';
            Array.from(pistasSet).sort().forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.innerText = p;
                select.appendChild(opt);
            });
            select.value = valAnterior;

            renderizar();
        }, (err) => {
            console.error("Erro no Firebase:", err);
            document.getElementById('msgStatus').innerText = "Erro de conexão com o banco.";
        });

        window.renderizar = function() {
            const container = document.getElementById('listaTreinos');
            const filtro = document.getElementById('filtroPista').value;
            container.innerHTML = '';

            const pistasEncontradas = Object.keys(dadosRanking).sort();

            if (pistasEncontradas.length === 0) {
                container.innerHTML = '<div class="text-center text-zinc-800 font-bold uppercase italic text-[10px] mt-20">Aguardando dados válidos...</div>';
                return;
            }

            pistasEncontradas.forEach(nomePista => {
                if (filtro !== "TODAS" && filtro !== nomePista) return;

                // Ordena os pilotos pela melhor volta (mais rápido primeiro)
                const rankPista = dadosRanking[nomePista].sort((a, b) => a.tempo.localeCompare(b.tempo));

                let html = `
                    <div class="card-pista rounded-[2rem] overflow-hidden shadow-2xl mb-8">
                        <div class="bg-zinc-900/60 p-5 border-b border-zinc-800 flex justify-between items-center">
                            <h3 class="text-sm font-black italic uppercase text-yellow-400 tracking-tighter">${nomePista}</h3>
                            <span class="text-[7px] text-zinc-600 font-bold uppercase italic">Ranking Best Lap</span>
                        </div>
                        <div class="p-3 space-y-2">
                `;

                rankPista.forEach((item, i) => {
                    html += `
                        <div onclick="location.href='telemetria.html?id=${item.id}'" class="btn-telemetria flex justify-between items-center p-4 bg-zinc-900/30 rounded-2xl border border-zinc-800/30 active:border-yellow-500/50 transition-all">
                            <div class="flex items-center gap-4">
                                <span class="font-black italic w-6 text-center ${i === 0 ? 'text-yellow-500 text-lg' : 'text-zinc-700 text-xs'}">${i+1}º</span>
                                <div>
                                    <div class="font-bold uppercase italic text-zinc-100 text-xs leading-none">${item.piloto}</div>
                                    <div class="text-[8px] text-zinc-500 font-bold uppercase mt-1.5 italic">${item.data}</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-[7px] text-zinc-600 font-bold uppercase italic">Tempo</div>
                                <div class="text-lg font-black font-mono text-white">${item.tempo}</div>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML += html + `</div></div>`;
            });
        };
    </script>
</body>
</html>
