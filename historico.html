<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Alterado para permitir rolagem e garantir fundo preto em toda a extensão */
        body { 
            background-color: #000; 
            color: white; 
            min-height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
            overflow-y: auto; /* Garante a rolagem vertical */
        }
        
        @media screen and (orientation: portrait) {
            #app-container { 
                transform: rotate(90deg); 
                transform-origin: center; 
                width: 100dvh; 
                height: 100vw; 
                position: absolute; 
                top: 50%; 
                left: 50%; 
                translate: -50% -50%; 
            }
        }
        
        .card-pista { 
            background: linear-gradient(180deg, #111 0%, #000 100%); 
            border: 1px solid #222; 
        }

        /* Esconde a barra de rolagem mas mantém a funcionalidade (opcional) */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app-container" class="p-6 min-h-screen">
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="text-zinc-500 font-bold uppercase text-[10px] border border-zinc-900 px-4 py-2 rounded-xl">← Menu</a>
            <select id="filtroPista" onchange="renderizar()" class="bg-zinc-900 text-white font-bold text-[10px] py-2 px-4 rounded-xl border border-zinc-800 outline-none uppercase">
                <option value="TODAS">Todas as Pistas</option>
            </select>
        </div>

        <div id="listaTreinos" class="space-y-6 max-w-3xl mx-auto pb-32">
            <div id="msgStatus" class="text-center text-zinc-500 font-bold uppercase italic text-[10px] mt-20">
                Sincronizando...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosRanking = {};

        onSnapshot(collection(db, "treinos"), (snapshot) => {
            dadosRanking = {};
            const pistasSet = new Set();
            
            if (snapshot.empty) {
                document.getElementById('msgStatus').innerText = "NENHUM DADO ENCONTRADO";
                return;
            }

            snapshot.forEach(doc => {
                const t = doc.data();
                
                if (t.pista && t.voltas && Array.isArray(t.voltas) && t.voltas.length > 0) {
                    const nomePista = t.pista.toUpperCase();
                    pistasSet.add(nomePista);

                    const melhorVolta = [...t.voltas].sort()[0] || "99:99.99";
                    const tempoTotalSessao = t.totalSessao || "---";

                    let dataF = "---";
                    if (t.data) {
                        try { dataF = t.data.toDate().toLocaleDateString('pt-BR'); } catch(e) { dataF = "Recente"; }
                    }

                    if (!dadosRanking[nomePista]) dadosRanking[nomePista] = [];
                    dadosRanking[nomePista].push({
                        id: doc.id,
                        piloto: t.piloto || "Piloto",
                        tempo: String(melhorVolta),
                        tempoTotal: tempoTotalSessao,
                        data: dataF
                    });
                }
            });

            const select = document.getElementById('filtroPista');
            const valAnterior = select.value;
            select.innerHTML = '<option value="TODAS">Todas as Pistas</option>';
            Array.from(pistasSet).sort().forEach(p => {
                select.innerHTML += `<option value="${p}">${p}</option>`;
            });
            select.value = valAnterior;

            document.getElementById('msgStatus').style.display = 'none';
            renderizar();
        });

        window.renderizar = function() {
            const container = document.getElementById('listaTreinos');
            const filtro = document.getElementById('filtroPista').value;
            container.innerHTML = '';

            Object.keys(dadosRanking).sort().forEach(pista => {
                if (filtro !== "TODAS" && filtro !== pista) return;

                const items = dadosRanking[pista].sort((a, b) => {
                    const tempoA = a.tempo || "99:99.99";
                    const tempoB = b.tempo || "99:99.99";
                    return tempoA.localeCompare(tempoB);
                });

                let html = `<div class="card-pista rounded-[2rem] overflow-hidden mb-8 shadow-lg">
                    <div class="bg-zinc-900/60 p-4 border-b border-zinc-800">
                        <h3 class="text-xs font-black uppercase text-yellow-500 italic">${pista}</h3>
                    </div>
                    <div class="p-2 space-y-1">`;

                items.forEach((item, i) => {
                    html += `
                        <div onclick="location.href='telemetria.html?id=${item.id}'" class="flex justify-between items-center p-4 bg-zinc-950 rounded-2xl border border-zinc-900 active:bg-zinc-900 cursor-pointer">
                            <div class="flex items-center gap-3">
                                <span class="font-black italic ${i===0?'text-yellow-500 text-lg':'text-zinc-700 text-xs'}">${i+1}º</span>
                                <div>
                                    <div class="font-bold uppercase italic text-zinc-100 text-[11px]">${item.piloto}</div>
                                    <div class="text-[7px] text-zinc-600 font-bold uppercase tracking-widest">${item.data}</div>
                                    <div class="text-[7px] text-zinc-500 font-bold uppercase mt-1">Total: ${item.tempoTotal}</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-[8px] font-black uppercase text-zinc-500 italic -mb-1">Melhor Volta</div>
                                <div class="text-lg font-black font-mono text-white italic">${item.tempo}</div>
                            </div>
                        </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });

            if (container.innerHTML === "") {
                container.innerHTML = '<div class="text-center text-zinc-700 font-bold uppercase italic text-[10px] mt-20">Nenhum ranking disponível para esta pista.</div>';
            }
        };
    </script>
</body>
</html>
