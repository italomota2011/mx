<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; min-height: 100dvh; margin: 0; font-family: sans-serif; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .scroll-custom::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full h-full flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <button onclick="location.href='index.html'" class="text-zinc-500 font-bold uppercase text-xs border border-zinc-800 px-4 py-2 rounded-xl italic">← Voltar</button>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter text-yellow-500">Global Ranking</h1>
        </div>

        <div id="listaRanking" class="flex-1 overflow-y-auto scroll-custom space-y-3">
            <p class="text-center text-zinc-600 animate-pulse mt-10 uppercase font-bold">A carregar dados da nuvem...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarRanking() {
            const container = document.getElementById('listaRanking');
            
            try {
                const q = query(collection(db, "treinos"), orderBy("data", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = "<p class='text-center text-zinc-700 mt-10'>Nenhum treino registado.</p>";
                    return;
                }

                container.innerHTML = ""; // Limpa o "Carregando"

                querySnapshot.forEach((doc) => {
                    const t = doc.data();
                    const dataFormatada = t.data ? new Date(t.data.seconds * 1000).toLocaleDateString('pt-BR') : '---';
                    
                    container.innerHTML += `
                        <div class="bg-zinc-950 border border-zinc-900 p-4 rounded-3xl flex justify-between items-center shadow-lg">
                            <div>
                                <div class="text-[10px] text-yellow-600 font-black uppercase italic">${t.pista}</div>
                                <div class="text-lg font-bold text-white uppercase italic leading-none">${t.piloto}</div>
                                <div class="text-[9px] text-zinc-600 mt-1 font-bold">${dataFormatada}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-[9px] text-zinc-500 font-bold uppercase italic">Sessão</div>
                                <div class="text-2xl font-black font-mono text-white leading-none">${t.totalSessao || t.tempoSessao}</div>
                                <div class="text-[10px] text-zinc-500 font-bold">${t.voltasTotal || 0} Voltas</div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = "<p class='text-center text-red-900'>Erro ao ligar ao servidor.</p>";
            }
        }

        carregarRanking();
    </script>
</body>
</html>
