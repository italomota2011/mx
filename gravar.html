    <style>
        body { overscroll-behavior-y: contain; overflow: hidden; background-color: #000; height: 100dvh; margin: 0; color: white; font-family: sans-serif; }
        
        #app-container {
            width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex; flex-direction: column; padding: 2vh 4vh; box-sizing: border-box;
        }

        @media screen and (orientation: landscape) {
            #app-container { transform: translate(-50%, -50%) rotate(0deg); width: 100vw; height: 100vh; }
        }

        /* Ajuste do tamanho para não esmagar os outros elementos */
        .centro-cronometro { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 0; /* Permite que o flex encolha se necessário */
        }
        
        .time-sessao { 
            font-size: 50vw;             font-weight: 900; 
            font-family: 'Courier New', Courier, monospace; 
            color: #fff; 
            line-height: 1; 
            letter-spacing: -5px;
        }

        /* Garante que o rodapé sempre tenha espaço e fique visível */
        .rodape-infos {
            height: 20vh;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 10px;
        }
    </style>
</head>
