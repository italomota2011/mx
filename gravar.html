<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Timer - Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }
        
        #app-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100dvh;
            padding: 15px;
            box-sizing: border-box;
        }

        @media screen and (orientation: portrait) {
            #app-container { 
                transform: rotate(90deg); transform-origin: center; 
                width: 100dvh; height: 100vw; 
                position: absolute; top: 50%; left: 50%; translate: -50% -50%; 
            }
        }

        .cronometro-total { 
            font-size: 24vw; 
            font-weight: 900; 
            font-family: monospace; 
            line-height: 0.8;
        }

        .numero-voltas {
            font-size: 12vh;
            font-weight: 900;
            color: #fbbf24;
            line-height: 1;
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div class="w-full flex justify-between items-start">
            <button onclick="window.location.href='index.html'" class="bg-zinc-900 text-zinc-400 px-6 py-3 rounded-xl font-bold uppercase text-xs border border-zinc-800">
                ← Voltar
            </button>
            
            <div class="text-right">
                <div class="text-zinc-500 font-bold uppercase text-[10px] italic">Voltas</div>
                <div id="contagemVoltas" class="numero-voltas">0</div>
            </div>
        </div>

        <div class="text-center">
            <div id="timerTotal" class="cronometro-total text-white">00:00</div>
            <div class="text-zinc-600 font-bold uppercase text-xs tracking-[0.5em] mt-2">Tempo Total</div>
        </div>
