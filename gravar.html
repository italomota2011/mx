<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar - MX4 Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            overscroll-behavior-y: contain; 
            overflow: hidden; 
            background-color: #000; 
            height: 100dvh; 
            margin: 0; 
            color: white; 
            font-family: sans-serif; 
        }

        #app-container {
            width: 100dvh;
            height: 100vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 5vh;
            box-sizing: border-box;
        }

        @media screen and (orientation: landscape) {
            #app-container {
                transform: translate(-50%, -50%) rotate(0deg);
                width: 100vw;
                height: 100vh;
            }
        }

        
        .time-sessao { 
            font-size: 40vw; 
            font-weight: 900; 
            font-family: 'Courier New', Courier, monospace; 
            line-height: 1; 
            color: #fff; 
            text-align: center;
            letter-spacing: -5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1; /* Ocupa todo o centro */
            width: 100%;
            pointer-events: none; /* Garante que o toque passe pelo texto se necessário */
        }

        #btnAcao {
            position: relative;
            z-index: 50; /* Garante que o botão esteja acima de tudo */
        }
    </style>
</head>
<body>
    <div id="app-container">
