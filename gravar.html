<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar - MX4 Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: contain; overflow: hidden; background-color: #000; height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        /* Cronômetro focado em Minutos e Segundos apenas */
        .time-sessao { 
            font-size: 40vh; 
            font-weight: 900; 
            font-family: 'Courier New', Courier, monospace; 
            line-height: 0.8; 
            color: #fff; 
            letter-spacing: -10px; 
        }
    </style>
</head>
<body>
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-between p-4">
        
        <div class="w-full flex justify-between items-start pt-2">
            <div>
                <h1 id="pistaNome" class="text-xl font-black italic uppercase text-yellow-500">---</h1>
                <p id="pilotoNome" class="text-[9px] font-bold uppercase text-zinc-500">Piloto</p>
            </div>
            <div class="text-right">
                <div id="statusGPS" class="text-[9px] font-bold uppercase text-red-500">Aguardando GPS...</div>
                <div id="infoSetor" class="text-[8px] font-black text-zinc-400 mt-1 uppercase italic bg-zinc-900 px-2 py-0.5 rounded text-center">AGUARDANDO LARGADA</div>
            </div>
        </div>

        <div class="flex flex-col items-center w-full">
            <div id="displayTempo" class="time-sessao">00:00</div>
            
            <div class="flex gap-12 mt-2">
                <div class="text-center">
                    <p class="text-[8px] text-zinc-500 font-bold uppercase">Voltas</p>
                    <p id="voltas" class="text-4xl font-black italic">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] text-zinc-500 font-bold uppercase">Última Volta</p>
                    <p id="ultimaVolta" class="text-4xl font-black italic text-zinc-400">--:--</p>
                </div>
            </div>
        </div>

        <div class="w-full max-w-sm pb-4 px-4">
            <button id="btnAcao" onclick="toggleGravar()" class="w-full bg-white text-black h-16 rounded-2xl font-black uppercase italic text-2xl shadow-2xl active:scale-95 transition-all">Iniciar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw-p_Gk...", // Suas configs
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        let gravando = false;
        let tempoInicioVolta = 0;
        let tempoInicialSessao = 0;
        let voltasCount = 0;
        let temposVoltas = [];
        let rastroTelemetria = [];
        let watchID = null;

        let pontoAtual = 0; 
        let temposSetoresVoltaAtual = [];
        let ultimoTimestampCorte = 0;

        const pistaAtiva = JSON.parse(localStorage.getItem('pistaAtiva'));
        const pilotoAtivo = sessionStorage.getItem('pilotoAtual');

        if(pistaAtiva) {
            document.getElementById('pistaNome').innerText = pistaAtiva.nome;
            document.getElementById('pilotoNome').innerText = pilotoAtivo || "Piloto";
        }

        window.toggleGravar = function() {
            if (!gravando) { iniciar(); } else { parar(); }
        }

        function iniciar() {
            gravando = true;
            tempoInicialSessao = Date.now();
            document.getElementById('btnAcao').innerText = "Parar";
            document.getElementById('btnAcao').classList.replace('bg-white', 'bg-red-600');
            document.getElementById('btnAcao').classList.add('text-white');

            watchID = navigator.geolocation.watchPosition(processarPosicao, null, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            });

            atualizarCronometro();
        }

        function processarPosicao(pos) {
            const { latitude: lat, longitude: lng, speed } = pos.coords;
            const vel = (speed * 3.6) || 0;

            document.getElementById('statusGPS').innerText = "GPS OK";
            document.getElementById('statusGPS').classList.replace('text-red-500', 'text-green-500');

            if (gravando) {
                rastroTelemetria.push({ lat, lng, vel, ts: Date.now() });

                const pontosPista = pistaAtiva.checkpoints || [{ lat: pistaAtiva.lat, lng: pistaAtiva.lng, tipo: "chegada" }];
                const alvo = pontosPista[pontoAtual];
                const dist = calcularDistancia(lat, lng, alvo.lat, alvo.lng);
                
                const nomesSetores = ["S4", "S1", "S2", "S3"];
                document.getElementById('infoSetor').innerText = `Setor Atual: ${nomesSetores[pontoAtual]}`;

                if (dist < 0.020) { 
                    const agora = Date.now();
                    if (alvo.tipo === "chegada") {
                        if (tempoInicioVolta > 0) {
                            const tempoTotalVolta = agora - tempoInicioVolta;
                            const tempoS4 = agora - ultimoTimestampCorte;
                            temposSetoresVoltaAtual.push(tempoS4);

                            const dadosVolta = {
                                total: formatarTempo(tempoTotalVolta),
                                ms: tempoTotalVolta,
                                setores: [...temposSetoresVoltaAtual]
                            };
                            temposVoltas.push(dadosVolta);
                            document.getElementById('ultimaVolta').innerText = dadosVolta.total;
                            voltasCount++;
                            document.getElementById('voltas').innerText = voltasCount;
                        }
                        tempoInicioVolta = agora;
                        ultimoTimestampCorte = agora;
                        temposSetoresVoltaAtual = [];
                        pontoAtual = pontosPista.length > 1 ? 1 : 0; 
                    } else { 
                        temposSetoresVoltaAtual.push(agora - ultimoTimestampCorte);
                        ultimoTimestampCorte = agora;
                        pontoAtual = (pontoAtual + 1) % pontosPista.length;
                    }
                }
            }
        }

        function atualizarCronometro() {
            if (!gravando) return;
            if (tempoInicioVolta > 0) {
                const diff = Date.now() - tempoInicioVolta;
                document.getElementById('displayTempo').innerText = formatarTempo(diff);
            }
            requestAnimationFrame(atualizarCronometro);
        }

        async function parar() {
            gravando = false;
            navigator.geolocation.clearWatch(watchID);
            document.getElementById('btnAcao').innerText = "Salvando...";
            try {
                await addDoc(collection(db, "treinos"), {
                    piloto: pilotoAtivo,
                    pista: pistaAtiva.nome,
                    voltasTotal: voltasCount,
                    voltas: temposVoltas,
                    data: serverTimestamp()
                });
                window.location.href = 'index.html';
            } catch (e) {
                alert("Erro ao salvar.");
                document.getElementById('btnAcao').innerText = "Tentar de novo";
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // FUNÇÃO AJUSTADA: Apenas Minutos e Segundos para o visor principal
        function formatarTempo(ms) {
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
