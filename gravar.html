<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            overscroll-behavior-y: contain; 
            overflow: hidden; 
            background-color: #000; 
            height: 100dvh; 
            margin: 0; 
            color: white; 
            font-family: sans-serif; 
        }

        #app-container {
            width: 100dvh;
            height: 100vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 4vh;
            box-sizing: border-box;
        }

        /* Se o celular já estiver deitado, não rotaciona */
        @media screen and (orientation: landscape) {
            #app-container {
                transform: translate(-50%, -50%) rotate(0deg);
                width: 100vw;
                height: 100vh;
            }
        }

        /* Cronômetro Responsivo: Ajusta o tamanho da fonte para nunca cortar */
        .time-sessao { 
            font-size: clamp(10rem, 45vh, 25rem);
            font-weight: 900; 
            font-family: 'Courier New', Courier, monospace; 
            line-height: 1; 
            color: #fff; 
            text-align: center;
            width: 100%;
        }

        .font-mono-custom { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="w-full flex justify-between items-center">
            <div class="text-left">
                <h1 id="pistaNome" class="text-xl font-black italic uppercase text-yellow-500 leading-tight">---</h1>
                <p id="pilotoNome" class="text-[10px] font-bold uppercase text-zinc-500 tracking-widest">Piloto</p>
            </div>
            <div class="text-right">
                <div id="statusGPS" class="text-[10px] font-bold uppercase text-red-500">Busca GPS</div>
                <div id="infoSetor" class="text-[9px] font-black text-zinc-400 mt-1 uppercase italic bg-zinc-900 px-3 py-1 rounded-full">AGUARDANDO</div>
            </div>
        </div>

        <div id="displayTempo" class="time-sessao">00:00</div>

        <div class="w-full flex justify-between items-end">
            <div class="flex gap-8 mb-2">
                <div class="text-left">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Voltas</p>
                    <p id="voltas" class="text-4xl font-black italic text-white leading-none">0</p>
                </div>
                <div class="text-left">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Última</p>
                    <p id="ultimaVolta
