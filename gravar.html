<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .time-sessao { font-size: 55vw; font-weight: 900; font-family: monospace; line-height: 1; color: #fff; letter-spacing: -10px; }
        .btn-start { background: #16a34a; border-bottom: 6px solid #14532d; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-between p-4">
        
        <div id="overlayStart" class="absolute inset-0 z-50 bg-black flex flex-center items-center justify-center p-10">
            <button onclick="iniciarTudo()" class="btn-start w-full h-32 rounded-3xl text-4xl font-black italic uppercase">Iniciar Treino</button>
        </div>

        <div class="w-full flex justify-between items-start">
            <div class="bg-zinc-900/50 p-2 px-4 rounded-xl border border-white/5">
                <div class="text-[10px] uppercase font-black text-zinc-500 italic leading-none">Piloto</div>
                <div id="displayPiloto" class="text-lg font-black italic uppercase text-yellow-500">---</div>
            </div>
            <div class="text-right">
                <div id="statusGPS" class="text-[10px] font-black uppercase text-red-500 italic">Sem Sinal GPS</div>
                <div id="displayPista" class="text-xs font-bold uppercase text-zinc-400 leading-none mt-1">---</div>
            </div>
        </div>

        <div id="cronometro" class="time-sessao">00:00</div>

        <div class="w-full grid grid-cols-3 gap-4 items-end">
            <div class="bg-zinc-900/50 p-3 rounded-2xl border border-white/5">
                <div class="text-[10px] font-black text-zinc-500 uppercase italic">Voltas</div>
                <div id="totalVoltas" class="text-4xl font-black italic">0</div>
            </div>
            <div class="col-span-2">
                <button id="btnAcao" onclick="pararTreino()" class="w-full bg-red-600 p-6 rounded-3xl text-2xl font-black italic uppercase shadow-2xl active:scale-95 transition-all">Parar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        let pistaAtiva = JSON.parse(localStorage.getItem('pistaAtiva'));
        let pilotoAtivo = sessionStorage.getItem('pilotoAtual');
        
        document.getElementById('displayPiloto').innerText = pilotoAtivo || "---";
        document.getElementById('displayPista').innerText = pistaAtiva?.nome || "---";

        let tempoInicialSessao, intervalSessao;
        let watchID = null;
        let rastroTelemetria = [];
        let temposVoltas = [];
        let voltasCount = 0;
        let ultimaLat, ultimaLng;
        let tempoPassagemAnterior = null;
        let marcasDeVolta = [];

        window.iniciarTudo = function() {
            document.getElementById('overlayStart').style.display = 'none';
            tempoInicialSessao = Date.now();
            intervalSessao = setInterval(atualizarCronometro, 100);
            
            if (navigator.geolocation) {
                watchID = navigator.geolocation.watchPosition(posicionar, erroGPS, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            }
        };

        function atualizarCronometro() {
            const diff = Date.now() - tempoInicialSessao;
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('cronometro').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function posicionar(pos) {
            const { latitude, longitude, speed } = pos.coords;
            ultimaLat = latitude;
            ultimaLng = longitude;
            
            document.getElementById('statusGPS').innerText = "Sinal OK";
            document.getElementById('statusGPS').classList.replace('text-red-500', 'text-green-500');

            rastroTelemetria.push({
                lat: latitude,
                lng: longitude,
                vel: (speed * 3.6 || 0).toFixed(1),
                t: Date.now() - tempoInicialSessao
            });

            const dist = calcularDistancia(latitude, longitude, pistaAtiva.lat, pistaAtiva.lng);
            
            // Raio de 15 metros para fechar volta
            if (dist < 0.015) {
                const agora = Date.now();
                if (!tempoPassagemAnterior || (agora - tempoPassagemAnterior > 10000)) {
                    if (tempoPassagemAnterior) {
                        const tempoVolta = (agora - tempoPassagemAnterior) / 1000;
                        temposVoltas.push(formatarTempoVolta(tempoVolta));
                        voltasCount++;
                        document.getElementById('totalVoltas').innerText = voltasCount;
                        marcasDeVolta.push({lat: latitude, lng: longitude, t: agora - tempoInicialSessao});
                    }
                    tempoPassagemAnterior = agora;
                }
            }
        }

        function erroGPS(err) {
            document.getElementById('statusGPS').innerText = "Erro GPS";
            document.getElementById('statusGPS').classList.replace('text-green-500', 'text-red-500');
        }

        window.pararTreino = async function() {
            clearInterval(intervalSessao);
            navigator.geolocation.clearWatch(watchID);
            const btn = document.getElementById('btnAcao');
            btn.disabled = true;
            btn.innerText = "Salvando...";

            try {
                await addDoc(collection(db, "treinos"), {
                    piloto: pilotoAtivo,
                    pista: pistaAtiva.nome,
                    voltasTotal: voltasCount,
                    voltas: temposVoltas,
                    telemetria: rastroTelemetria,
                    marcasDeVolta: marcasDeVolta,
                    totalSessao: document.getElementById('cronometro').innerText,
                    data: serverTimestamp()
                });
                alert("Treino gravado com sucesso!");
                window.location.href = 'index.html';
            } catch (e) {
                alert("Erro ao salvar.");
                btn.disabled = false;
                btn.innerText = "Parar";
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatarTempoVolta(segundos) {
            const m = Math.floor(segundos / 60);
            const s = Math.floor(segundos % 60);
            const ms = Math.floor((segundos % 1) * 100);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
        }
    </script>
</body>
</html>
