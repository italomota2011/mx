<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: contain; overflow: hidden; background-color: #000; height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .time-sessao { font-size: 55vw; font-weight: 900; font-family: monospace; line-height: 1; color: #fff; letter-spacing: -10px; }
        .setor-badge { font-size: 2vw; font-weight: bold; padding: 2px 10px; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-between p-4">
        
        <div class="w-full flex justify-between items-start pt-2">
            <div>
                <h1 id="pistaNome" class="text-2xl font-black italic uppercase leading-none text-yellow-500">---</h1>
                <p id="pilotoNome" class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Piloto</p>
            </div>
            <div class="text-right">
                <div id="statusGPS" class="text-[10px] font-bold uppercase text-red-500">Aguardando GPS...</div>
                <div id="infoSetor" class="text-xs font-bold text-zinc-400 mt-1">PROCURANDO LARGADA</div>
            </div>
        </div>

        <div class="flex flex-col items-center">
            <div id="displayTempo" class="time-sessao">00:00</div>
            <div class="flex gap-4 mt-[-40px]">
                <div class="text-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Voltas</p>
                    <p id="voltas" class="text-4xl font-black italic">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Última</p>
                    <p id="ultimaVolta" class="text-4xl font-black italic text-zinc-400">--:--</p>
                </div>
            </div>
        </div>

        <div class="w-full pb-4 px-10">
            <button id="btnAcao" onclick="toggleGravar()" class="w-full bg-white text-black h-20 rounded-3xl font-black uppercase italic text-2xl shadow-2xl active:scale-95 transition-all">Iniciar Treino</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw-p_Gk...", // Use suas configs originais aqui
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => console.log("Offline Ativo"));

        let gravando = false;
        let tempoInicioVolta = 0;
        let tempoInicialSessao = 0;
        let voltasCount = 0;
        let temposVoltas = [];
        let rastroTelemetria = [];
        let watchID = null;
        
        // --- LOGICA DE SETORES ---
        let checkpointAtual = 0; 
        let temposSetoresVoltaAtual = [];
        let ultimoTempoReferencia = 0;

        const pistaAtiva = JSON.parse(localStorage.getItem('pistaAtiva'));
        const pilotoAtivo = sessionStorage.getItem('pilotoAtual');

        document.getElementById('pistaNome').innerText = pistaAtiva.nome;
        document.getElementById('pilotoNome').innerText = pilotoAtivo;

        window.toggleGravar = function() {
            if (!gravando) {
                iniciar();
            } else {
                parar();
            }
        }

        function iniciar() {
            gravando = true;
            tempoInicialSessao = Date.now();
            document.getElementById('btnAcao').innerText = "Parar e Salvar";
            document.getElementById('btnAcao').classList.replace('bg-white', 'bg-red-600');
            document.getElementById('btnAcao').classList.add('text-white');

            watchID = navigator.geolocation.watchPosition(processarPosicao, null, {
                enableHighAccuracy: true,
                maximumAge: 0
            });

            atualizarCronometro();
        }

        function processarPosicao(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const vel = (pos.coords.speed * 3.6) || 0;

            document.getElementById('statusGPS').innerText = "GPS ATIVO";
            document.getElementById('statusGPS').classList.replace('text-red-500', 'text-green-500');

            if (gravando) {
                rastroTelemetria.push({ lat, lng, vel, ts: Date.now() });

                // Define os checkpoints (Se a pista for antiga, cria um array com o ponto único)
                const checkpoints = pistaAtiva.checkpoints || [{ lat: pistaAtiva.lat, lng: pistaAtiva.lng, tipo: "chegada" }];
                const proximoCP = checkpoints[checkpointAtual];

                const dist = calcularDistancia(lat, lng, proximoCP.lat, proximoCP.lng);

                // Mostra no painel qual setor estamos procurando
                document.getElementById('infoSetor').innerText = `PROCURANDO: ${proximoCP.tipo.toUpperCase()}`;

                if (dist < 0.025) { // 25 metros de raio
                    const agora = Date.now();

                    if (proximoCP.tipo === "chegada") {
                        if (tempoInicioVolta > 0) {
                            const tempoTotalMs = agora - tempoInicioVolta;
                            
                            // Fecha o último setor (S4 ou único)
                            const tempoS_final = agora - ultimoTempoReferencia;
                            temposSetoresVoltaAtual.push(tempoS_final);

                            // Salva a volta
                            const voltaObj = {
                                total: formatarTempo(tempoTotalMs),
                                ms: tempoTotalMs,
                                setores: [...temposSetoresVoltaAtual]
                            };
                            temposVoltas.push(voltaObj);
                            
                            document.getElementById('ultimaVolta').innerText = voltaObj.total;
                            voltasCount++;
                            document.getElementById('voltas').innerText = voltasCount;
                        }
                        
                        // Reseta para nova volta
                        tempoInicioVolta = agora;
                        ultimoTempoReferencia = agora;
                        temposSetoresVoltaAtual = [];
                        checkpointAtual = (checkpoints.length > 1) ? 1 : 0; // Se tem setores, vai pro S1, senão volta pra chegada
                    } else {
                        // Marcou um setor intermediário (S1, S2, S3)
                        const tempoSetor = agora - ultimoTempoReferencia;
                        temposSetoresVoltaAtual.push(tempoSetor);
                        ultimoTempoReferencia = agora;
                        checkpointAtual++; // Vai para o próximo checkpoint da lista
                    }
                }
            }
        }

        function atualizarCronometro() {
            if (!gravando) return;
            if (tempoInicioVolta > 0) {
                const diff = Date.now() - tempoInicioVolta;
                document.getElementById('displayTempo').innerText = formatarTempo(diff);
            }
            requestAnimationFrame(atualizarCronometro);
        }

        async function parar() {
            gravando = false;
            navigator.geolocation.clearWatch(watchID);
            const btn = document.getElementById('btnAcao');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            try {
                await addDoc(collection(db, "treinos"), {
                    piloto: pilotoAtivo,
                    pista: pistaAtiva.nome,
                    voltasTotal: voltasCount,
                    voltas: temposVoltas, // Agora envia objetos com setores
                    data: serverTimestamp(),
                    totalSessao: formatarTempo(Date.now() - tempoInicialSessao)
                });
                alert("Treino salvo!");
                window.location.href = 'index.html';
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
                btn.disabled = false;
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatarTempo(ms) {
            const m = Math.floor(ms / 60000);
            const s = ((ms % 60000) / 1000).toFixed(2);
            return `${m}:${s.padStart(5, '0')}`;
        }
    </script>
</body>
</html>
