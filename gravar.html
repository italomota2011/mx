<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .time { font-size: 28vw; font-weight: 900; font-family: 'Courier New', Courier, monospace; line-height: 0.8; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-center">
        <button onclick="location.href='index.html'" class="absolute top-6 left-6 text-zinc-600 font-bold uppercase text-xs border border-zinc-800 px-4 py-2 rounded-lg italic">← Sair</button>
        <div class="text-center">
            <div id="lap" class="text-yellow-400 font-black italic text-4xl mb-4 tracking-tighter">VOLTA 1</div>
            <div id="timer" class="time">00:00.00</div>
            <div id="last" class="text-zinc-500 font-bold uppercase tracking-widest mt-6 text-xl">Última: --:--.--</div>
        </div>
        <div class="absolute bottom-10">
            <button id="btn" onclick="start()" class="bg-green-600 text-white px-24 py-8 rounded-[3rem] font-black uppercase text-3xl border-b-8 border-green-900 active:translate-y-2 active:border-b-0">Iniciar</button>
        </div>
    </div>
    <script>
        let s = 0, run = false, int;
        function start() {
            const b = document.getElementById('btn');
            if(!run) {
                s = Date.now(); int = setInterval(up, 10); run = true;
                b.innerText = "PARAR"; b.classList.replace('bg-green-600','bg-red-600');
                b.classList.replace('border-green-900','border-red-900');
            } else {
                clearInterval(int); run = false;
                b.innerText = "INICIAR"; b.classList.replace('bg-red-600','bg-green-600');
                b.classList.replace('border-red-900','border-green-900');
            }
        }
        function up() {
            const d = new Date(Date.now() - s);
            const m = d.getMinutes().toString().padStart(2,'0');
            const sec = d.getSeconds().toString().padStart(2,'0');
            const ms = Math.floor(d.getMilliseconds()/10).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${sec}.${ms}`;
        }
    </script>
</body>
</html>
