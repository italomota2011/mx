<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravar - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Reset para evitar scrolls e comportamentos elásticos no PWA */
        * {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: #000; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white;
            font-family: sans-serif;
        }

        /* REMOVIDA A ROTAÇÃO MANUAL @media (orientation: portrait)
           O PWA usa o 'orientation: landscape' do manifest.json.
           Forçar rotação via CSS no PWA causa o erro de corte de tela.
        */

        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Ajuste do cronômetro para nunca estourar a altura da tela */
        .time-sessao { 
            font-size: 45vh; /* Baseado na altura para caber sempre no modo deitado */
            font-weight: 900; 
            font-family: 'Courier New', Courier, monospace; 
            line-height: 1; 
            color: #fff;
            letter-spacing: -2vh;
            text-align: center;
        }

        .info-topo {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            font-weight: bold;
