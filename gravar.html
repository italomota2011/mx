<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            overscroll-behavior-y: contain; 
            overflow: hidden; 
            background-color: #000; 
            height: 100dvh; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-family: sans-serif; 
        }

        /* Container que rotaciona para preencher a tela */
        #app-container { 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            width: 100%;
            height: 100%;
        }

        @media screen and (orientation: portrait) {
            #app-container { 
                transform: rotate(90deg); 
                transform-origin: center; 
                width: 100dvh; 
                height: 100vw; 
                position: absolute; 
                top: 50%; 
                left: 50%; 
                translate: -50% -50%; 
            }
        }

        /* Ajuste do Cronômetro: Agora baseado na altura (vh) para não estourar */
        .time-sessao { 
            font-size: 35vh; /* Ajustado de 55vw para 35vh */
            font-weight: 900; 
            font-family: monospace; 
            line-height: 0.9; 
            color: #fff;
            letter-spacing: -5px;
        }

        /* Estilo para não quebrar o layout em telas menores */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: -1vh;
        }
    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="w-full flex justify-between items-start">
            <div class="max-w-[60%]">
                <h1 id="pistaNome" class="text-xl font-black italic uppercase leading-none text-yellow-500 truncate">---</h1>
                <p id="pilotoNome" class="text-[9px] font-bold uppercase tracking-widest text-zinc-500">Piloto</p>
            </div>
            <div class="text-right">
                <div id="statusGPS" class="text-[9px] font-bold uppercase text-red-500">Aguardando GPS...</div>
                <div id="infoSetor" class="text-[8px] font-black text-zinc-400 mt-1 uppercase italic bg-zinc-900 px-2 py-0.5 rounded">LARGADA</div>
            </div>
        </div>

        <div class="flex flex-col items-center w-full">
            <div id="displayTempo" class="time-sessao">00:00</div>
            
            <div class="info-grid">
                <div class="text-center border-r border-zinc-800 pr-8">
                    <p class="text-[8px] text-zinc-500 font-bold uppercase">Voltas</p>
                    <p id="voltas" class="text-3xl font-black italic">0</p>
                </div>
                <div class="text-center pl-4">
                    <p class="text-[8px] text-zinc-500 font-bold uppercase">Última Volta</p>
                    <p id="ultimaVolta" class="text-3xl font-black italic text-zinc-400">--:--</p>
                </div>
            </div>
        </div>

        <div class="w-full max-w-sm px-4">
            <button id="btnAcao" onclick="toggleGravar()" class="w-full bg-white text-black h-14 rounded-2xl font-black uppercase italic text-xl shadow-2xl active:scale-95 transition-all">Iniciar Treino</button>
        </div>
    </div>
