<div id="app-container" class="w-full h-full flex flex-col items-center justify-between p-4">
    <div class="w-full flex justify-between items-center">
        <button onclick="encerrarSessao()" class="text-zinc-600 font-bold uppercase text-[10px] border border-zinc-800 px-3 py-1 rounded-lg italic">← Sair</button>
        <div id="infoSessao" class="text-zinc-500 font-black italic text-[10px] uppercase tracking-tighter text-right leading-none">
            <span id="txtPista">...</span><br>
            <span id="txtPiloto" class="text-yellow-400">...</span>
        </div>
    </div>

    <div class="text-center">
        <div class="text-zinc-500 font-black italic text-lg mb-1 uppercase tracking-tighter">Lap Time</div>
        <div id="timerVolta" class="time-total">00:00.00</div>
        <div id="ultimaVolta" class="text-zinc-500 font-bold italic text-xl mt-2 uppercase">Última: --:--.--</div>
    </div>

    <div class="w-full grid grid-cols-3 gap-4 items-center">
        <div class="bg-zinc-950 p-3 rounded-2xl border border-zinc-900 text-center">
            <div class="text-[9px] text-zinc-600 font-bold uppercase italic">Sessão</div>
            <div id="timerTotal" class="text-xl font-bold font-mono">00:00</div>
        </div>

        <button id="btnAcao" onclick="alternarSessao()" class="bg-green-600 text-white font-black py-5 rounded-2xl uppercase text-lg border-b-4 border-green-900 active:scale-95 transition-all">
            Iniciar
        </button>

        <div class="bg-zinc-950 p-3 rounded-2xl border border-zinc-900 text-center">
            <div class="text-[9px] text-zinc-600 font-bold uppercase italic">Voltas</div>
            <div id="contagemVoltas" class="text-xl font-black italic">0</div>
        </div>
    </div>
</div>

<script type="module">
    // ... (Importações e Config igual ao seu arquivo)

    window.alternarSessao = function() {
        if (!pistaAtiva) return alert("Mapeie a pista!");
        
        const btn = document.getElementById('btnAcao');
        if (!gravando) {
            gravando = true;
            tempoInicialSessao = tempoInicialVolta = Date.now();
            intervalo = setInterval(atualizarRelogios, 10);
            iniciarMonitoramentoGPS();
            
            // Alteração visual para o estado "Gravando"
            btn.innerText = "Parar";
            btn.classList.replace('bg-green-600', 'bg-red-600');
            btn.classList.replace('border-green-900', 'border-red-900');
        } else {
            pararESalvar();
        }
    };

    // Função de salvar com tratamento de erro visível
    async function pararESalvar() {
        clearInterval(intervalo);
        if (watchID) navigator.geolocation.clearWatch(watchID);
        
        const btn = document.getElementById('btnAcao');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            await addDoc(collection(db, "treinos"), {
                piloto: pilotoAtivo,
                pista: pistaAtiva.nome,
                voltas: voltasExecutadas,
                totalSessao: document.getElementById('timerTotal').innerText,
                data: serverTimestamp()
            });
            
            alert("Treino salvo com sucesso!");
            location.href = 'index.html';
        } catch (e) {
            console.error("Erro ao salvar: ", e);
            alert("Erro Firebase: " + e.message); // Isso vai nos dizer o motivo exato
            btn.disabled = false;
            btn.innerText = "Tentar Denovo";
        }
    }
    // ... resto das funções (formatar, calcularDistancia)
</script>
