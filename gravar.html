<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronômetro - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .time-big { font-size: 20vw; font-weight: 900; color: #1a1a1a; font-family: monospace; line-height: 1; }
        .logo-small { width: 80px; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body onclick="requestLandscape()">
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-center">
        <img src="https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/logo.png" class="logo-small">
        <button onclick="location.href='index.html'" class="absolute top-5 left-5 bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-bold border border-red-200 uppercase">Sair</button>
        
        <div class="text-center">
            <p id="lapCount" class="text-orange-600 font-black italic text-2xl mb-2">VOLTA 1</p>
            <div id="displayTime" class="time-big">00:00.00</div>
            <p id="lastLap" class="text-gray-400 font-bold mt-2 uppercase tracking-widest">Última: --:--.--</p>
        </div>

        <div class="absolute bottom-10 flex gap-6">
            <button onclick="toggleTimer()" class="bg-green-600 text-white px-12 py-5 rounded-3xl font-black shadow-xl uppercase border-b-4 border-green-800 active:scale-95">Iniciar</button>
        </div>
    </div>
</body>
</html>
