<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronômetro - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .time-display { font-size: 22vw; font-weight: 900; color: #00ff00; text-shadow: 0 0 30px rgba(0,255,0,0.5); line-height: 1; }
    </style>
</head>
<body onclick="requestLandscape()">
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-between p-6">
        <div class="w-full flex justify-between items-start">
            <button onclick="location.href='index.html'" class="bg-red-900/50 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase border border-red-500">← Sair</button>
            <div class="text-right">
                <p id="lapCount" class="text-yellow-400 font-bold italic text-xl">VOLTA 1</p>
                <p id="lastLap" class="text-gray-400 font-mono text-sm">Última: --:--.--</p>
            </div>
        </div>

        <div class="time-display font-mono">00:00.00</div>

        <div class="flex gap-8 mb-4">
            <button onclick="toggleTimer()" class="bg-green-600 w-20 h-20 rounded-full flex items-center justify-center shadow-3xl border-4 border-white/20">
                <div class="w-0 h-0 border-t-[15px] border-t-transparent border-l-[25px] border-l-white border-b-[15px] border-b-transparent ml-2"></div>
            </button>
        </div>
    </div>
</body>
</html>
