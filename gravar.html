<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: contain; overflow: hidden; background-color: #000; height: 100dvh; margin: 0; color: white; font-family: sans-serif; }
        
        #app-container {
            width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex; flex-direction: column; padding: 2vh 5vh; box-sizing: border-box;
        }

        @media screen and (orientation: landscape) {
            #app-container { transform: translate(-50%, -50%) rotate(0deg); width: 100vw; height: 100vh; }
        }

        .centro-cronometro { flex: 1; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        
        .time-sessao { 
            font-size: 38vw; /* Aumentado levemente */
            font-weight: 900; font-family: 'Courier New', Courier, monospace; 
            color: #fff; line-height: 1; letter-spacing: -5px;
        }

        #btnAcao { pointer-events: auto !important; z-index: 100; }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="w-full flex justify-between items-start">
            <div>
                <h1 id="pistaNome" class="text-xl font-black italic uppercase text-yellow-500">---</h1>
                <p id="pilotoNome" class="text-[10px] font-bold uppercase text-zinc-500">PILOTO</p>
            </div>
            <div class="text-right">
                <div id="statusGPS" class="text-[10px] font-bold uppercase text-red-500">BUSCA GPS</div>
                <div id="infoSetor" class="text-[9px] font-black text-zinc-400 mt-1 uppercase italic bg-zinc-900 px-3 py-1 rounded-full tracking-widest">STANDBY</div>
            </div>
        </div>

        <div class="centro-cronometro">
            <div id="displayTempo" class="time-sessao">00:00</div>
        </div>

        <div class="w-full flex justify-between items-end pb-2">
            <div class="flex gap-10">
                <div>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase leading-none">Voltas</p>
                    <p id="voltas" class="text-5xl font-black italic">0</p>
                </div>
                <div>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase leading-none">Última</p>
                    <p id="ultimaVolta" class="text-5xl font-black italic text-zinc-400">--:--</p>
                </div>
            </div>

            <button id="btnAcao" onclick="toggleGravar()" class="bg-white text-black h-14 px-10 rounded-xl font-black uppercase italic text-xl shadow-2xl active:scale-95 transition-all">
                Iniciar
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw-p_Gk...", 
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let gravando = false;
        let tempoInicioVolta = 0;
        let voltasCount = 0;
        let temposVoltas = [];
        let watchID = null;
        let pontoAtual = 0; 
        let temposSetoresVoltaAtual = [];
        let ultimoTimestampCorte = 0;
        
        // Bloqueio de 10 segundos para evitar falsos positivos no mesmo ponto
        let lastTriggerTime = 0;
        const TRIGGER_LOCKOUT = 10000; 

        const pistaAtiva = JSON.parse(localStorage.getItem('pistaAtiva'));
        const pilotoAtivo = sessionStorage.getItem('pilotoAtual');

        if(pistaAtiva) {
            document.getElementById('pistaNome').innerText = pistaAtiva.nome;
            document.getElementById('pilotoNome').innerText = pilotoAtivo || "Piloto";
        }

        window.toggleGravar = function() {
            if (!gravando) { iniciar(); } else { parar(); }
        };

        function iniciar() {
            gravando = true;
            const btn = document.getElementById('btnAcao');
            btn.innerText = "PARAR";
            btn.style.backgroundColor = "#dc2626";
            btn.style.color = "white";

            watchID = navigator.geolocation.watchPosition(processarPosicao, null, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
            atualizarCronometro();
        }

        function processarPosicao(pos) {
            const { latitude: lat, longitude: lng } = pos.coords;
            const agora = Date.now();
            
            document.getElementById('statusGPS').innerText = "GPS OK";
            document.getElementById('statusGPS').className = "text-[10px] font-bold uppercase text-green-500";

            if (gravando) {
                const pontosPista = pistaAtiva.checkpoints || [{ lat: pistaAtiva.lat, lng: pistaAtiva.lng, tipo: "chegada" }];
                const alvo = pontosPista[pontoAtual];
                const dist = calcularDistancia(lat, lng, alvo.lat, alvo.lng);
                
                const nomesSetores = ["S4", "S1", "S2", "S3"];
                document.getElementById('infoSetor').innerText = `SETOR: ${nomesSetores[pontoAtual]}`;

                // Raio de 25 metros + Verificação de Tempo de Bloqueio
                if (dist < 0.025 && (agora - lastTriggerTime) > TRIGGER_LOCKOUT) { 
                    lastTriggerTime = agora; // Reseta o cronômetro de bloqueio

                    if (alvo.tipo === "chegada") {
                        if (tempoInicioVolta > 0) {
                            const tempoTotalVolta = agora - tempoInicioVolta;
                            temposSetoresVoltaAtual.push(agora - ultimoTimestampCorte);
                            
                            temposVoltas.push({
                                total: formatarTempoBD(tempoTotalVolta),
                                ms: tempoTotalVolta,
                                setores: [...temposSetoresVoltaAtual]
                            });
                            
                            document.getElementById('ultimaVolta').innerText = formatarTempoTela(tempoTotalVolta);
                            voltasCount++;
                            document.getElementById('voltas').innerText = voltasCount;
                        }
                        tempoInicioVolta = agora;
                        ultimoTimestampCorte = agora;
                        temposSetoresVoltaAtual = [];
                        pontoAtual = pontosPista.length > 1 ? 1 : 0; 
                    } else { 
                        temposSetoresVoltaAtual.push(agora - ultimoTimestampCorte);
                        ultimoTimestampCorte = agora;
                        pontoAtual = (pontoAtual + 1) % pontosPista.length;
                    }
                }
            }
        }

        function atualizarCronometro() {
            if (!gravando) return;
            if (tempoInicioVolta > 0) {
                const diff = Date.now() - tempoInicioVolta;
                document.getElementById('displayTempo').innerText = formatarTempoTela(diff);
            }
            requestAnimationFrame(atualizarCronometro);
        }

        async function parar() {
            gravando = false;
            navigator.geolocation.clearWatch(watchID);
            document.getElementById('btnAcao').innerText = "...";
            try {
                await addDoc(collection(db, "treinos"), {
                    piloto: pilotoAtivo,
                    pista: pistaAtiva.nome,
                    voltasTotal: voltasCount,
                    voltas: temposVoltas,
                    data: serverTimestamp()
                });
                window.location.href = 'index.html';
            } catch (e) {
                window.location.href = 'index.html';
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatarTempoTela(ms) {
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatarTempoBD(ms) {
            const m = Math.floor(ms / 60000);
            const s = ((ms % 60000) / 1000).toFixed(2);
            return `${m}:${s.padStart(5, '0')}`;
        }
    </script>
</body>
</html>
