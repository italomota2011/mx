<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overscroll-behavior-y: contain; 
            overflow: hidden; 
            background-color: #000; 
            height: 100dvh; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
        }

        /* ROTAÇÃO FORÇADA TRAVADA */
        #app-container { 
            transform: rotate(90deg); 
            transform-origin: center; 
            width: 100dvh; 
            height: 100vw; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            translate: -50% -50%; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 1.5rem;
            pointer-events: none; /* Cliques passam pelo fundo e chegam nos botões */
        }

        .time-sessao { 
            font-size: 45vw; 
            font-weight: 900; 
            font-family: monospace; 
            line-height: 1; 
            color: #fff;
            letter-spacing: -10px;
        }

        /* ÁREA DE CLIQUE REAL */
        button, #btnAcao {
            pointer-events: auto !important; /* Reativa o clique nos botões */
            position: relative;
            z-index: 9999;
            cursor: pointer;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="w-full flex justify-between items-center">
            <button id="btnVoltar" class="text-zinc-400 font-bold uppercase text-[12px] border border-zinc-800 px-6 py-3 rounded-xl italic bg-zinc-900">
                ← Vol
