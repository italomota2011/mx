<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            color: white; 
            font-family: sans-serif; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Quando o celular estiver deitado (Paisagem) */
        @media (orientation: landscape) {
            .time-sessao { font-size: 50vw; }
            .container-principal { padding: 2vh 5vw; }
        }

        /* Quando o celular estiver em pé (Retrato) */
        @media (orientation: portrait) {
            .time-sessao { font-size: 25vw; }
            .container-principal { padding: 5vh 5vw; }
        }

        .time-sessao { 
            font-weight: 900; 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: -2px;
            line-height: 1;
            transition: font-size 0.3s ease;
        }

        #btnAcao {
            touch-action: manipulation;
            z-index: 9999;
        }
    </style>
</head>

        </div>
