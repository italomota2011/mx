<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .time-sessao { font-size: 35vw; font-weight: 900; font-family: monospace; line-height: 1; color: #fff; letter-spacing: -2px; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-between p-4">
        <div class="w-full flex justify-between items-center">
            <button onclick="window.encerrarSessao()" class="text-zinc-600 font-bold uppercase text-[10px] border border-zinc-800 px-4 py-2 rounded-xl italic">← Voltar</button>
            <div class="text-zinc-500 font-black italic text-[10px] uppercase tracking-tighter text-right leading-none">
                <span id="txtPista">...</span><br>
                <span id="txtPiloto" class="text-yellow-400">...</span>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center">
            <div id="timerTotal" class="time-sessao">00:00.00</div>
        </div>

        <div class="w-full grid grid-cols-3 gap-4 items-center mb-2">
            <div class="bg-zinc-950 p-4 rounded-3xl border border-zinc-900 text-center">
                <div class="text-[9px] text-zinc-600 font-bold uppercase italic mb-1">Voltas</div>
                <div id="contagemVoltas" class="text-3xl font-black italic text-white">0</div>
            </div>
            <button id="btnAcao" onclick="window.alternarSessao()" class="bg-green-600 text-white font-black py-6 rounded-3xl uppercase text-xl border-b-4 border-green-900 active:scale-95 transition-all">Iniciar</button>
            <div class="bg-zinc-950 p-4 rounded-3xl border border-zinc-900 text-center">
                <div class="text-[9px] text-zinc-600 font-bold uppercase italic mb-1 leading-tight">Status</div>
                <div id="statusTXT" class="text-[10px] font-black italic text-zinc-500 uppercase italic">Pronto</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let gravando = false, tempoInicialSessao, tempoReferenciaVolta, intervalo, watchID;
        let voltasCount = 0, temposVoltas = [], rastroGPS = [];
        const pistaAtiva = JSON.parse(localStorage.getItem('pistaAtiva'));
        const pilotoAtivo = sessionStorage.getItem('pilotoAtual') || "Piloto";

        if(pistaAtiva) {
            document.getElementById('txtPista').innerText = pistaAtiva.nome;
            document.getElementById('txtPiloto').innerText = pilotoAtivo;
        }

        window.alternarSessao = function() {
            if (!gravando) {
                if (!pistaAtiva) return alert("Pista não selecionada!");
                gravando = true;
                const agora = Date.now();
                tempoInicialSessao = agora; tempoReferenciaVolta = agora;
                intervalo = setInterval(() => {
                    const diff = Date.now() - tempoInicialSessao;
                    document.getElementById('timerTotal').innerText = formatar(diff);
                }, 10);
                iniciarGPS();
                document.getElementById('btnAcao').innerText = "Parar";
                document.getElementById('btnAcao').className = "bg-red-600 text-white font-black py-6 rounded-3xl uppercase text-xl border-b-4 border-red-900";
            } else { pararESalvar(); }
        };

        function formatar(ms) {
            const m = String(Math.floor(ms / 60000)).padStart(2, '0');
            const s = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
            const c = String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
            return `${m}:${s}.${c}`;
        }

        function iniciarGPS() {
            watchID = navigator.geolocation.watchPosition((pos) => {
                const agora = Date.now();
                // GUARDAR TELEMETRIA PARA O GRÁFICO
                rastroGPS.push({
                    lat: pos.coords.latitude, lng: pos.coords.longitude,
                    vel: pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(1) : 0,
                    ts: agora - tempoInicialSessao
                });

                const R = 6371;
                const dLat = (pos.coords.latitude - pistaAtiva.lat) * Math.PI / 180;
                const dLon = (pos.coords.longitude - pistaAtiva.lng) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(pos.coords.latitude * Math.PI / 180) * Math.cos(pistaAtiva.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

                if (dist < 0.025) {
                    const duracao = agora - tempoReferenciaVolta;
                    if (duracao > 15000) {
                        temposVoltas.push(formatar(duracao));
                        voltasCount++;
                        document.getElementById('contagemVoltas').innerText = voltasCount;
                        tempoReferenciaVolta = agora;
                    }
                }
            }, null, { enableHighAccuracy: true });
        }

        async function pararESalvar() {
            clearInterval(intervalo);
            navigator.geolocation.clearWatch(watchID);
            try {
                await addDoc(collection(db, "treinos"), {
                    piloto: pilotoAtivo, pista: pistaAtiva.nome,
                    voltas: temposVoltas, telemetria: rastroGPS,
                    totalSessao: document.getElementById('timerTotal').innerText,
                    data: serverTimestamp()
                });
                location.href = 'index.html';
            } catch (e) { location.href = 'index.html'; }
        }

        window.encerrarSessao = () => { if(confirm("Sair?")) location.href = 'index.html'; };
    </script>
</body>
</html>
