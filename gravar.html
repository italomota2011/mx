<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravar - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .time { font-size: 25vw; font-weight: 900; font-family: monospace; color: #fff; line-height: 1; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="app-container" class="w-full h-full flex flex-col items-center justify-center p-4">
        <button onclick="location.href='index.html'" class="absolute top-6 left-6 text-gray-500 font-bold uppercase text-xs border border-gray-800 px-4 py-2 rounded-lg">← Sair</button>
        <div id="lap" class="text-yellow-400 font-black italic text-3xl mb-2">VOLTA 1</div>
        <div id="timer" class="time">00:00.00</div>
        <div id="last" class="text-gray-500 font-bold uppercase tracking-widest mt-4">Última: --:--.--</div>
        <div class="absolute bottom-8 w-full flex justify-center gap-10">
            <button id="btn" onclick="start()" class="bg-green-600 text-white px-20 py-6 rounded-3xl font-black uppercase text-2xl border-b-4 border-green-900 active:scale-95 shadow-lg">Iniciar</button>
        </div>
    </div>
    <script>
        let s = 0, run = false, int;
        function start() {
            const b = document.getElementById('btn');
            if(!run) {
                s = Date.now(); int = setInterval(up, 10); run = true;
                b.innerText = "PARAR"; b.classList.replace('bg-green-600','bg-red-600');
            } else {
                clearInterval(int); run = false;
                b.innerText = "INICIAR"; b.classList.replace('bg-red-600','bg-green-600');
            }
        }
        function up() {
            const d = new Date(Date.now() - s);
            const m = d.getMinutes().toString().padStart(2,'0');
            const sec = d.getSeconds().toString().padStart(2,'0');
            const ms = Math.floor(d.getMilliseconds()/10).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${sec}.${ms}`;
        }
    </script>
</body>
</html>
