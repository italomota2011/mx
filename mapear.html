<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapear - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .logo-mx { height: 25dvh; margin-bottom: 10px; }
        .glass { background: #1a1a1a; border: 1px solid #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full flex flex-col justify-end items-center h-full">
        <img src="https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/logo.png" class="logo-mx">
        <div class="glass p-5 rounded-[2.5rem] w-full max-w-2xl shadow-2xl">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-xl font-black italic uppercase text-white">Mapear <span class="text-yellow-400">Pista</span></h2>
                <button onclick="location.href='index.html'" class="text-gray-400 font-bold uppercase text-xs">← Voltar</button>
            </div>
            <input type="text" id="pistaNome" placeholder="NOME DA PISTA" class="w-full p-4 rounded-xl bg-black border border-gray-700 mb-4 text-center font-bold text-white outline-none focus:border-yellow-400">
            <div class="grid grid-cols-2 gap-4">
                <button id="btnGravar" onclick="iniciar()" class="bg-orange-600 text-white font-black py-4 rounded-2xl uppercase border-b-4 border-orange-900 active:scale-95">Capturar Ponto</button>
                <button id="btnSalvar" onclick="salvar()" class="bg-green-600 text-white font-black py-4 rounded-2xl uppercase border-b-4 border-green-900 opacity-50 active:scale-95" disabled>Salvar</button>
            </div>
            <p id="st" class="text-center text-[10px] mt-2 text-gray-500 font-mono">GPS STATUS: STANDBY</p>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const fb = initializeApp({ apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU", projectId: "mxlaptimer", appId: "1:790485374192:web:6e18d1863f4702b6be9e35" });
        const db = getFirestore(fb);
        let pt = null;
        window.iniciar = () => {
            navigator.geolocation.getCurrentPosition(p => {
                pt = { lat: p.coords.latitude, lng: p.coords.longitude };
                document.getElementById('st').innerText = "PONTO CAPTURADO COM SUCESSO!";
                document.getElementById('btnSalvar').disabled = false;
                document.getElementById('btnSalvar').classList.remove('opacity-50');
            }, null, {enableHighAccuracy:true});
        };
        window.salvar = async () => {
            const n = document.getElementById('pistaNome').value;
            if(!n) return alert("Dê um nome!");
            await addDoc(collection(db, "pistas"), { nome: n, pontoPartida: pt });
            location.href = 'index.html';
        };
    </script>
</body>
</html>
