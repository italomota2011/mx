<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapear Pista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100dvh; display: flex; align-items: center; justify-content: center; }
        .btn-map { background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%); border-bottom: 4px solid #1e3a8a; }
        .btn-gps { background: #222; border: 1px solid #444; }
    </style>
</head>
<body class="p-6">
    <div class="w-full max-w-md space-y-6 text-center">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Mapear <span class="text-blue-500">Pista</span></h1>
        
        <button onclick="ligarGPS()" id="btnLigarGPS" class="w-full p-4 rounded-2xl btn-gps font-bold uppercase text-yellow-500">
            1. Ativar GPS (Clique aqui)
        </button>

        <input type="text" id="nomePista" placeholder="NOME DA PISTA (Ex: CT MX4)" class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-center font-bold uppercase outline-none focus:border-blue-500">
        
        <div id="statusGPS" class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">Aguardando ativação...</div>

        <button onclick="capturarPonto()" class="w-full p-6 rounded-3xl btn-map text-xl font-black italic uppercase shadow-xl active:scale-95 transition-transform">
            2. Salvar Coordenada
        </button>

        <a href="index.html" class="block text-zinc-600 text-xs font-bold uppercase tracking-widest">Voltar</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => console.log("Offline Ativo"));

        let lat, lng;
        let watchID = null;

        window.ligarGPS = function() {
            if (watchID) return;
            
            const btn = document.getElementById('btnLigarGPS');
            btn.innerText = "Buscando Sinal...";

            watchID = navigator.geolocation.watchPosition((pos) => {
                lat = pos.coords.latitude;
                lng = pos.coords.longitude;
                document.getElementById('statusGPS').innerText = `GPS OK: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                document.getElementById('statusGPS').classList.replace('text-zinc-500', 'text-green-500');
                btn.innerText = "GPS CONECTADO";
                btn.classList.replace('text-yellow-500', 'text-green-500');
            }, (err) => {
                alert("Erro ao acessar GPS. Verifique as permissões do Safari.");
            }, { 
                enableHighAccuracy: true, 
                maximumAge: 0,
                timeout: 10000 
            });
        };

        window.capturarPonto = async function() {
            const nome = document.getElementById('nomePista').value;
            if(!nome) return alert("Digita o nome da pista!");
            if(!lat) return alert("Clique em 'Ativar GPS' e aguarde o sinal.");

            try {
                await addDoc(collection(db, "pistas"), { nome, lat, lng });
                alert("Pista guardada com sucesso!");
                window.location.href = 'index.html';
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        };
    </script>
</body>
</html>
