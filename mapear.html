<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapear Pista - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/background.png');
            background-size: cover;
            background-position: center;
            height: 100dvh; margin: 0; overflow: hidden;
            display: flex; align-items: flex-end; justify-content: center; background-color: #000;
        }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
    </style>
</head>
<body onclick="requestLandscape()">
    <div id="app-container" class="w-full flex justify-center items-end h-full">
        <div class="glass p-6 rounded-[2rem] w-full max-w-2xl shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-black text-white italic">MAPEAR <span class="text-yellow-400">PISTA</span></h1>
                <button onclick="location.href='index.html'" class="bg-gray-700 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">← Voltar</button>
            </div>
            
            <input type="text" id="pistaNome" placeholder="NOME DA PISTA" class="w-full p-3 rounded-xl bg-black/50 border border-gray-600 mb-4 text-white text-center font-bold">

            <div class="grid grid-cols-2 gap-4">
                <button id="btnGravar" onclick="iniciarMapeamento()" class="bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase border-b-4 border-orange-900">Iniciar Gravação</button>
                <button id="btnSalvar" onclick="salvarPista()" class="bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase border-b-4 border-green-900 opacity-50" disabled>Salvar Pista</button>
            </div>
            <p id="coordsDisplay" class="mt-3 text-[10px] text-orange-400 font-mono text-center">GPS AGUARDANDO...</p>
        </div>
    </div>
    <script type="module">
        /* Importar Firebase aqui conforme código anterior */
        window.requestLandscape = async () => { try { await screen.orientation.lock('landscape'); } catch(e) {} };
    </script>
</body>
</html>
