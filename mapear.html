<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapear</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; background: #222; color: #fff; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 20px; margin: 5px 0; border: none; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-cap { background: #ea580c; color: white; border-bottom: 4px solid #9a3412; }
        .btn-sav { background: #22c55e; color: white; border-bottom: 4px solid #166534; }
        .btn-vol { background: #333; color: #999; margin-top: 15px; padding: 10px; }
        #dot { width: 15px; height: 15px; background: #333; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status { font-size: 12px; color: #666; margin: 15px 0; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="font-style: italic; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 25px;">Mapear Pista</h2>
        
        <input type="text" id="pistaNome" placeholder="NOME DA PISTA (EX: CT MX4)">
        
        <div class="status">
            <span id="dot"></span>
            <span id="txt">Aguardando Captura</span>
        </div>

        <button id="cap" class="btn btn-cap">Capturar Ponto GPS</button>
        <button id="sav" class="btn btn-sav">Salvar Pista</button>
        <button onclick="location.href='index.html'" class="btn btn-vol">Voltar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);

        let ponto = null;

        document.getElementById('cap').addEventListener('click', function() {
            var txt = document.getElementById('txt');
            var dot = document.getElementById('dot');
            
            txt.innerText = "Buscando...";
            dot.style.background = "yellow";

            if (!navigator.geolocation) {
                alert("Seu celular não tem GPS.");
                return;
            }

            navigator.geolocation.getCurrentPosition(function(pos) {
                ponto = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                dot.style.background = "#22c55e";
                txt.innerText = "Ponto Fixado!";
                alert("Localização capturada!");
            }, function(err) {
                dot.style.background = "red";
                txt.innerText = "Erro no GPS";
                alert("Erro GPS: " + err.message);
            }, { enableHighAccuracy: true, timeout: 10000 });
        });

        document.getElementById('sav').addEventListener('click', function() {
            var nome = document.getElementById('pistaNome').value;
            if (!nome) { alert("Dê um nome à pista!"); return; }
            if (!ponto) { alert("Capture o ponto primeiro!"); return; }

            var dados = { nome: nome, lat: ponto.lat, lng: ponto.lng };
            localStorage.setItem('pistaAtiva', JSON.stringify(dados));
            alert("Pista salva localmente!");
            location.href = 'index.html';
        });
    </script>
</body>
</html>
