<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapear - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        input::placeholder { color: #555; }
        .btn-active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full max-w-4xl p-6 flex flex-col items-center">
        <div class="w-full flex justify-between items-center mb-8">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">Mapear <span class="text-yellow-400">Pista</span></h2>
            <button onclick="location.href='index.html'" class="bg-zinc-900 border border-zinc-800 text-zinc-400 px-6 py-2 rounded-xl font-bold uppercase text-xs hover:bg-zinc-800 transition-all">← Voltar</button>
        </div>

        <div class="w-full bg-zinc-950 border border-zinc-900 p-8 rounded-[2.5rem] shadow-2xl">
            <div class="mb-6">
                <label class="block text-zinc-500 text-[10px] font-bold uppercase mb-2 ml-4 italic">Nome do Circuito</label>
                <input type="text" id="pistaNome" placeholder="EX: PISTA DO SETOR 4" 
                    class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-center text-xl font-black uppercase tracking-widest focus:border-yellow-500 focus:outline-none transition-colors">
            </div>

            <div id="gpsStatus" class="mb-8 text-center">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-zinc-900 border border-zinc-800">
                    <div id="gpsDot" class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                    <span id="gpsText" class="text-[10px] font-bold uppercase text-zinc-500 italic">GPS Aguardando</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button id="btnCapturar" onclick="capturarPonto()" 
                    class="bg-orange-600 hover:bg-orange-500 text-white font-black py-8 rounded-3xl uppercase text-sm border-b-4 border-orange-900 transition-all active:translate-y-1">
                    Marcar Chegada<br><span class="text-[10px] opacity-70">Clique na Linha de Partida</span>
                </button>
                
                <button id="btnSalvar" onclick="salvarPista()" disabled
                    class="bg-zinc-800 text-zinc-600 font-black py-8 rounded-3xl uppercase text-sm border-b-4 border-zinc-900 cursor-not-allowed transition-all">
                    Salvar Pista<br><span class="text-[10px] opacity-70">Aguardando Captura</span>
                </button>
            </div>
        </div>

        <div id="coordsDebug" class="mt-6 font-mono text-[10px] text-zinc-700 uppercase tracking-tighter">
            Lat: --.------ | Lng: --.------
        </div>
    </div>

    <script>
        let pontoCapturado = null;

        function capturarPonto() {
            const btn = document.getElementById('btnCapturar');
            const dot = document.getElementById('gpsDot');
            const text = document.getElementById('gpsText');
            const debug = document.getElementById('coordsDebug');
            const btnSalvar = document.getElementById('btnSalvar');

            btn.innerText = "Buscando...";
            btn.classList.add('animate-pulse');

            // Opções de alta precisão para o GPS
            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    pontoCapturado = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    };

                    // Atualiza Interface
                    dot.classList.replace('bg-red-600', 'bg-green-500');
                    text.innerText = "GPS Conectado";
                    debug.innerText = `Lat: ${pontoCapturado.lat.toFixed(6)} | Lng: ${pontoCapturado.lng.toFixed(6)}`;
                    
                    btn.innerText = "Ponto Capturado ✓";
                    btn.classList.remove('animate-pulse');
                    btn.classList.replace('bg-orange-600', 'bg-green-700');
                    btn.classList.replace('border-orange-900', 'border-green-900');

                    // Habilita Botão Salvar
                    btnSalvar.disabled = false;
                    btnSalvar.classList.replace('bg-zinc-800', 'bg-yellow-500');
                    btnSalvar.classList.replace('text-zinc-600', 'text-black');
                    btnSalvar.classList.replace('border-zinc-900', 'border-yellow-700');
                    btnSalvar.classList.remove('cursor-not-allowed');
                },
                (err) => {
                    alert("Erro no GPS: " + err.message);
                    btn.innerText = "Tentar Novamente";
                    btn.classList.remove('animate-pulse');
                },
                options
            );
        }

        function salvarPista() {
            const nome = document.getElementById('pistaNome').value.trim();
            
            if (!nome) {
                alert("Por favor, dê um nome para a pista!");
                document.getElementById('pistaNome').focus();
                return;
            }

            if (!pontoCapturado) {
                alert("Capture as coordenadas primeiro!");
                return;
            }

            const dadosPista = {
                nome: nome,
                lat: pontoCapturado.lat,
                lng: pontoCapturado.lng,
                data: new Date().toLocaleDateString('pt-BR')
            };

            // Salva no LocalStorage para uso no gravar.html
            localStorage.setItem('pistaAtiva', JSON.stringify(dadosPista));
            
            alert("Pista '" + nome + "' salva com sucesso!");
            location.href = 'index.html';
        }

        // Tenta travar a tela em landscape ao carregar
        function tryLock() { 
            if(screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(()=>{}); 
            }
        }
        window.onload = tryLock
