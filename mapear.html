<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapear</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; background: #222; color: #fff; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 20px; margin: 5px 0; border: none; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-cap { background: #ea580c; color: white; border-bottom: 4px solid #9a3412; }
        .btn-sav { background: #facc15; color: black; border-bottom: 4px solid #a16207; }
        .btn-back { background: none; color: #555; font-size: 12px; margin-top: 10px; }
        #status { font-size: 10px; color: #888; margin: 15px 0; text-transform: uppercase; }
        .dot { height: 10px; width: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="font-style: italic; font-weight: 900;">MAPEAR PISTA</h2>
    <input type="text" id="pistaNome" placeholder="NOME DO TRAÇADO">
    <div id="status">
        <span id="dot" class="dot"></span> <span id="txt">GPS Desconectado</span>
    </div>
    <button class="btn btn-cap" id="cap">Capturar Ponto</button>
    <button class="btn btn-sav" id="sav">Salvar Pista</button>
    <button class="btn btn-back" onclick="window.location.href='index.html'">Voltar ao Menu</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
        authDomain: "mxlaptimer.firebaseapp.com",
        projectId: "mxlaptimer",
        storageBucket: "mxlaptimer.firebasestorage.app",
        messagingSenderId: "790485374192",
        appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    var ponto = null;

    document.getElementById('cap').addEventListener('click', function() {
        var txt = document.getElementById('txt');
        var dot = document.getElementById('dot');
        txt.innerText = "Buscando...";
        dot.style.background = "yellow";

        navigator.geolocation.getCurrentPosition(function(pos) {
            ponto = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            dot.style.background = "#22c55e";
            txt.innerText = "Ponto Fixado!";
            alert("Localização capturada!");
        }, function(err) {
            dot.style.background = "red";
            txt.innerText = "Erro no GPS";
            alert("Erro GPS: " + err.message);
        }, { enableHighAccuracy: true, timeout: 10000 });
    });

    document.getElementById('sav').addEventListener('click', async function() {
        var nome = document.getElementById('pistaNome').value;
        if (!nome || !ponto) { alert("Complete o mapeamento!"); return; }

        this.disabled = true;
        this.innerText = "Enviando...";

        try {
            await addDoc(collection(db, "pistas"), {
                nome: nome,
                lat: ponto.lat,
                lng: ponto.lng,
                criadoEm: new Date()
            });
            alert("Pista salva na nuvem com sucesso!");
            window.location.href = 'index.html';
        } catch (e) {
            alert("Erro ao salvar no banco de dados.");
            this.disabled = false;
            this.innerText = "Salvar Pista";
        }
    });
</script>
</body>
</html>
