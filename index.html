<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no text-zinc-100">
    <title>MX Lap Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid #222; }
    </style>
</head>
<body>
    <div id="app-container" class="glass w-[95%] max-w-lg p-8 rounded-[3rem] text-center shadow-2xl">
        <img src="logo.png" class="h-24 mx-auto mb-6 opacity-90" alt="MX4">
        
        <div class="grid grid-cols-1 gap-4">
            <button onclick="abrirSessao()" class="bg-yellow-500 py-6 rounded-2xl text-black font-black uppercase text-xl border-b-4 border-yellow-700 active:scale-95 transition-all">Nova Sessão</button>
            <button onclick="location.href='historico.html'" class="bg-zinc-900 py-6 rounded-2xl text-white font-black uppercase text-xl border-b-4 border-zinc-800 active:scale-95 transition-all">Ranking Global</button>
            <button onclick="location.href='mapear.html'" class="bg-zinc-950 py-4 rounded-2xl text-zinc-500 font-bold uppercase text-xs border border-zinc-900 active:scale-95 transition-all">Mapear Pista</button>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50">
            <div class="bg-zinc-900 w-full max-w-sm p-8 rounded-[2rem] border border-zinc-800">
                <h3 class="text-white font-black italic uppercase mb-4 text-center">Configurar Treino</h3>
                <input type="text" id="pilotoNome" placeholder="TEU NOME / NÚMERO" class="w-full p-4 mb-4 rounded-xl bg-black border border-zinc-800 text-white font-bold uppercase text-center">
                <select id="pistaSelect" class="w-full p-4 mb-6 rounded-xl bg-black border border-zinc-800 text-white font-bold uppercase text-center focus:outline-none">
                    <option value="">A CARREGAR PISTAS...</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 text-zinc-500 font-bold uppercase text-xs">Sair</button>
                    <button onclick="iniciar()" class="flex-[2] bg-green-600 py-4 rounded-xl text-white font-black uppercase border-b-4 border-green-900">Gravar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.abrirSessao = async () => {
            const modal = document.getElementById('modal');
            const select = document.getElementById('pistaSelect');
            modal.classList.remove('hidden');

            const querySnapshot = await getDocs(collection(db, "pistas"));
            select.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const p = doc.data();
                const opt = document.createElement('option');
                opt.value = JSON.stringify(p);
                opt.innerText = p.nome;
                select.appendChild(opt);
            });
        };

        window.iniciar = () => {
            const nome = document.getElementById('pilotoNome').value;
            const pista = document.getElementById('pistaSelect').value;
            if(!nome || !pista) return alert("Preenche tudo!");
            
            sessionStorage.setItem('pilotoAtual', nome);
            localStorage.setItem('pistaAtiva', pista);
            location.href = 'gravar.html';
        };
    </script>
</body>
</html>
