<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX Lap Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/background.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
        }
        .glass {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass p-8 rounded-2xl w-full max-w-md text-center border border-orange-500">
        <h1 class="text-3xl font-bold text-white mb-8 italic">MX LAP TIMER</h1>
        
        <div class="flex flex-col gap-4">
            <button onclick="nav('mapear')" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                MAPEAR PISTA
            </button>
            <button onclick="nav('gravar')" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                GRAVAR TEMPOS
            </button>
            <button onclick="nav('historico')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                VER TEMPOS GRAVADOS
            </button>
        </div>
    </div>

    <script>
        function nav(page) {
            // Lógica simples de roteamento ou redirecionamento
            console.log("Navegando para: " + page);
        }
    </script>
</body>
</html>
