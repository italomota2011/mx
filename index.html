<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Lap Timer</title>
    <link rel="manifest" href="manifest.json">
    
<meta name="theme-color" content="#ea580c">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MXTimer">
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registrado!"));
  }
</script>
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    body { 
        background-color: #000; 
        height: 100dvh; 
        margin: 0; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-family: sans-serif;
        /* Travas de segurança PWA */
        overscroll-behavior-y: contain; 
        overflow: hidden; 
    }
    @media screen and (orientation: portrait) {
        #app-container { 
            transform: rotate(90deg); 
            transform-origin: center; 
            width: 100dvh; 
            height: 100vw; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            translate: -50% -50%; 
        }
    }
    .logo-mx { height: 28dvh; width: auto; max-height: 160px; object-fit: contain; margin-bottom: 10px; }
    .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); width: 95%; max-width: 550px; }
</style>
</head>
<body onclick="tryLock()">
    <div id="app-container" class="w-full flex flex-col items-center justify-center p-2">
        <img src="https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/logo.png" class="logo-mx">
        
        <div class="glass p-5 rounded-[2rem] text-center shadow-2xl">
            <h1 class="text-xl font-black text-white mb-4 italic tracking-tighter uppercase">MX <span class="text-yellow-400">Lap Timer</span></h1>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="location.href='mapear.html'" class="bg-orange-600 text-white font-black py-4 rounded-xl uppercase text-[10px] border-b-4 border-orange-900 active:scale-95">Mapear Pista</button>
                <button id="btnGravar" class="bg-green-600 text-white font-black py-4 rounded-xl uppercase text-[10px] border-b-4 border-green-900 active:scale-95">Gravar Tempos</button>
                <button onclick="location.href='historico.html'" class="bg-blue-600 text-white font-black py-4 rounded-xl uppercase text-[10px] border-b-4 border-blue-900 active:scale-95">Ver Tempos</button>
            </div>
        </div>
    </div>

    <div id="modalSessao" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-950 border border-zinc-800 p-6 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-black italic text-white mb-4 uppercase tracking-tighter">Nova <span class="text-yellow-400">Sessão</span></h3>
            <div class="space-y-4">
                <input type="text" id="pilotoNome" placeholder="NOME DO PILOTO" class="w-full p-3 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold uppercase outline-none text-sm">
                <select id="selecaoPista" class="w-full p-3 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold uppercase outline-none text-sm">
                    <option value="">A carregar pistas...</option>
                </select>
                <div class="flex gap-2">
                    <button id="btnCancelar" class="flex-1 py-3 text-zinc-500 font-bold uppercase text-[10px]">Cancelar</button>
                    <button id="btnConfirmar" class="flex-[2] bg-green-600 py-3 rounded-xl text-white font-black uppercase text-[10px] border-b-4 border-green-900">Iniciar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Funções globais
        window.tryLock = function() { 
            if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); 
        };

        const btnGravar = document.getElementById('btnGravar');
        const modal = document.getElementById('modalSessao');
        const select = document.getElementById('selecaoPista');

        // Ação do Botão Gravar
        btnGravar.onclick = async () => {
            modal.classList.remove('hidden');
            select.innerHTML = "<option value=''>A carregar pistas...</option>";
            try {
                const querySnapshot = await getDocs(collection(db, "pistas"));
                select.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const p = doc.data();
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify(p);
                    opt.innerText = p.nome.toUpperCase();
                    select.appendChild(opt);
                });
            } catch (e) {
                select.innerHTML = "<option>Erro ao carregar pistas</option>";
            }
        };

        document.getElementById('btnCancelar').onclick = () => modal.classList.add('hidden');

        document.getElementById('btnConfirmar').onclick = () => {
            const nome = document.getElementById('pilotoNome').value;
            const pista = select.value;
            if (!nome || !pista) { alert("Preencha tudo!"); return; }
            localStorage.setItem('pistaAtiva', pista);
            sessionStorage.setItem('pilotoAtual', nome);
            location.href = 'gravar.html';
        };
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Ativo!"))
    .catch(err => console.log("Erro no SW:", err));
  }
</script>
</body>
</html>
