<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX4 Lap Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* Fundo Branco */
            background-color: #ffffff;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: flex-end; /* Menu na parte inferior */
            justify-content: center;
        }

        /* FORÇAR HORIZONTAL VIA CSS SE O CELULAR ESTIVER EM PÉ */
        @media screen and (orientation: portrait) {
            #app-container {
                transform: rotate(90deg);
                transform-origin: center;
                width: 100dvh;
                height: 100vw;
                position: absolute;
                top: 50%;
                left: 50%;
                translate: -50% -50%;
            }
        }

        .glass {
            background: rgba(240, 240, 240, 0.9); /* Fundo claro para combinar com o branco */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .logo-mx {
            width: 180px; /* Ajuste o tamanho da logo aqui */
            margin: 0 auto 20px auto;
            display: block;
        }

        .btn-mx {
            transition: all 0.2s;
        }
        .btn-mx:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body onclick="requestLandscape()">

    <div id="app-container" class="w-full flex flex-col justify-end items-center h-full">
        
        <img src="https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/logo.png" alt="MX4 Logo" class="logo-mx">

        <div class="glass p-6 rounded-[2.5rem] w-full max-w-2xl text-center shadow-xl">
            <h1 class="text-3xl font-black text-gray-900 mb-6 italic tracking-tighter">
                MX4 <span class="text-yellow-500">LAP TIMER</span>
            </h1>
            
            <div class="grid grid-cols-3 gap-4">
                <button onclick="nav('mapear.html')" class="btn-mx bg-orange-600 text-white font-black py-6 rounded-2xl shadow-lg uppercase text-xs border-b-4 border-orange-800">
                    Mapear Pista
                </button>
                <button onclick="nav('gravar.html')" class="btn-mx bg-green-600 text-white font-black py-6 rounded-2xl shadow-lg uppercase text-xs border-b-4 border-green-800">
                    Gravar Tempos
                </button>
                <button onclick="nav('historico.html')" class="btn-mx bg-blue-600 text-white font-black py-6 rounded-2xl shadow-lg uppercase text-xs border-b-4 border-blue-800">
                    Ver Histórico
                </button>
            </div>

            <p class="mt-4 text-[9px] text-gray-400 uppercase font-bold tracking-widest">
                Toque para travar a tela na horizontal
            </p>
        </div>

    </div>

    <script>
        async function requestLandscape() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) {
                console.log("Rotação automática bloqueada pelo navegador.");
            }
        }

        function nav(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
