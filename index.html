<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Lap Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/background.png');
            background-size: cover;
            background-position: center;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .glass {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        /* Aviso para girar o celular caso esteja em pé */
        @media (orientation: portrait) {
            #aviso-giro {
                display: flex;
            }
        }
        #aviso-giro {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body class="p-4">

    <div id="aviso-giro">
        <div class="text-6xl mb-4">🔄</div>
        <h2 class="text-2xl font-bold italic">Gire o celular</h2>
        <p class="text-gray-400">Este sistema funciona apenas na horizontal.</p>
    </div>

    <div class="glass p-6 rounded-3xl w-full max-w-2xl text-center border border-gray-700 shadow-2xl">
        <h1 class="text-3xl font-black text-white mb-6 italic tracking-tighter">
            MX <span class="text-yellow-400">LAP TIMER</span>
        </h1>
        
        <div class="grid grid-cols-3 gap-4">

                Mapear Pista
            </button>
