<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>MX4 Lap Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000000; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* FORÇAR ROTAÇÃO SE ESTIVER EM PÉ */
        @media screen and (orientation: portrait) {
            #app-container { 
                transform: rotate(90deg); 
                transform-origin: center; 
                width: 100dvh; 
                height: 100vw; 
                position: absolute; 
                top: 50%; 
                left: 50%; 
                translate: -50% -50%; 
            }
        }

        /* AJUSTE DA LOGOMARCA VERTICAL */
        .logo-mx { 
            height: 45dvh; /* Ocupa 45% da altura da tela horizontal */
            width: auto; 
            max-height: 250px; 
            object-fit: contain; 
            margin: 0 auto 15px auto; 
            display: block;
        }

        .glass { 
            background: rgba(25, 25, 25, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

            transition: transform 0.1s ease;
