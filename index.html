<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX4 Lap Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .logo-mx { height: 28dvh; width: auto; max-height: 160px; object-fit: contain; margin-bottom: 10px; }
        .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); width: 95%; max-width: 550px; }
    </style>
</head>
<body onclick="tryLock()">
    <div id="app-container" class="w-full flex flex-col items-center justify-center p-2">
        <img src="https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/logo.png" class="logo-mx">
        
        <div class="glass p-5 rounded-[2rem] text-center shadow-2xl">
            <h1 class="text-xl font-black text-white mb-4 italic tracking-tighter uppercase">MX4 <span class="text-yellow-400">Lap Timer</span></h1>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="location.href='mapear.html'" class="bg-orange-600 text-white font-black py-4 rounded-xl uppercase text-[10px] border-b-4 border-orange-900 active:scale-95">Mapear Pista</button>
                <button onclick="abrirPreGravacao()" class="bg-green-600 text-white font-black py-4 rounded-xl uppercase text-[10px] border-b-4 border-green-900 active:scale-95">Gravar Tempos</button>
                <button onclick="location.href='historico.html'" class="bg-blue-600 text-white font-black py-4 rounded-xl uppercase text-[10px] border-b-4 border-blue-900 active:scale-95">Ver Histórico</button>
            </div>
        </div>
    </div>

    <div id="modalSessao" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-950 border border-zinc-800 p-6 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-black italic text-white mb-4 uppercase tracking-tighter">Nova <span class="text-yellow-400">Sessão</span></h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-bold text-zinc-500 uppercase ml-2 italic">Piloto</label>
                    <input type="text" id="pilotoNome" placeholder="NOME DO PILOTO" class="w-full p-3 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold uppercase focus:border-green-500 outline-none text-sm">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-zinc-500 uppercase ml-2 italic">Pista</label>
                    <select id="selecaoPista" class="w-full p-3 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold uppercase outline-none text-sm">
                        </select>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="fecharModal()" class="flex-1 py-3 text-zinc-500 font-bold uppercase text-[10px]">Cancelar</button>
                    <button onclick="confirmarSessao()" class="flex-[2] bg-green-600 py-3 rounded-xl text-white font-black uppercase text-[10px] border-b-4 border-green-900">Iniciar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function tryLock() { if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }
        
        function abrirPreGravacao() {
            const pistaAtiva = JSON.parse(localStorage.getItem('pistaAtiva'));
            if (!pistaAtiva) {
                alert("Nenhuma pista mapeada!");
                return;
            }
            const select = document.getElementById('selecaoPista');
            select.innerHTML = `<option value='${JSON.stringify(pistaAtiva)}'>${pistaAtiva.nome}</option>`;
            document.getElementById('modalSessao').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modalSessao').classList.add('hidden'); }

        function confirmarSessao() {
            const nome = document.getElementById('pilotoNome').value;
            if (!nome) { alert("Informe o piloto!"); return; }
            sessionStorage.setItem('pilotoAtual', nome);
            location.href = 'gravar.html';
        }
    </script>
</body>
</html>
