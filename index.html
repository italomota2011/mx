<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX4 Lap Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; height: 100dvh; margin: 0; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .logo-mx { height: 40dvh; width: auto; max-height: 250px; object-fit: contain; margin-bottom: 10px; }
        .glass { background: rgba(30, 30, 30, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
    </style>
</head>
<body onclick="tryLock()">
    <div id="app-container" class="w-full flex flex-col justify-end items-center h-full">
        <img src="https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/logo.png" class="logo-mx">
        <div class="glass p-6 rounded-[2.5rem] w-full max-w-2xl text-center shadow-2xl">
            <h1 class="text-3xl font-black text-white mb-6 italic tracking-tighter uppercase">MX4 <span class="text-yellow-400">Lap Timer</span></h1>
            <div class="grid grid-cols-3 gap-4">
                <button onclick="location.href='mapear.html'" class="bg-orange-600 text-white font-black py-6 rounded-2xl shadow-lg uppercase text-xs border-b-4 border-orange-900 active:scale-95">Mapear Pista</button>
                <button onclick="location.href='gravar.html'" class="bg-green-600 text-white font-black py-6 rounded-2xl shadow-lg uppercase text-xs border-b-4 border-green-900 active:scale-95">Gravar Tempos</button>
                <button onclick="location.href='historico.html'" class="bg-blue-600 text-white font-black py-6 rounded-2xl shadow-lg uppercase text-xs border-b-4 border-blue-900 active:scale-95">Ver Histórico</button>
            </div>
        </div>
    </div>
    <script>
        function tryLock() { if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }
    </script>
</body>
</html>
