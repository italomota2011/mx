    <title>MX4 Lap Timer</title>

    <meta name="theme-color" content="#ea580c">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    body {
        background-image: url('https://raw.githubusercontent.com/italomota2011/mx/refs/heads/main/background.png');
        background-size: cover;
        background-position: center center;
        background-attachment: fixed;
        height: 100dvh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        
        display: flex;
        align-items: flex-end; /* Menu na base */
        justify-content: center;
    }

    .glass {
        background: rgba(0, 0, 0, 0.85); /* Escurecido para destacar o amarelo */
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 92%;
        max-width: 360px;
        margin-bottom: 20px; /* Menu bem próximo à base */
    }

    .btn-mx {
        transition: transform 0.1s ease;
        text-transform: uppercase;
        font-style: italic;
    }

    .btn-mx:active {
        transform: scale(0.96);
    }
    </style>
</head>
