<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; }
        #map { height: 400px; width: 100%; border-radius: 1rem; cursor: crosshair; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
        .modal.active { display: flex; flex-direction: column; }
        .volta-item.ativa { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
    </style>
</head>
<body class="p-4">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase leading-none">TELEMETRIA PRO</h1>
            <p id="txtInfo" class="text-[10px] text-zinc-500 font-bold uppercase mt-1"></p>
        </div>
        
        <div class="flex gap-2">
            <select id="selectComparar" onchange="window.mudarComparacaoRapida()" class="bg-zinc-900 border border-zinc-700 text-[10px] p-2 rounded-lg font-bold uppercase text-white">
                <option value="">Comparar com...</option>
                <option value="melhor">Melhor Volta da Sessão</option>
            </select>
            <button onclick="history.back()" class="bg-zinc-900 border border-zinc-800 px-6 py-2 rounded-xl text-[10px] font-black uppercase italic">Voltar</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <div class="lg:col-span-3 space-y-4">
            <div class="glass p-4">
                <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-3 italic">Voltas Gravadas</h3>
                <div id="listaVoltas" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
            
            <div class="glass p-4">
                <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-2 italic">Análise de G-Force</h3>
                <div class="flex justify-between text-[10px] font-bold">
                    <span class="text-red-500 italic">● FRENAGEM</span>
                    <span class="text-green-500 italic">● ACELERAÇÃO</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-4">
            <div class="glass p-2 relative group">
                <div id="map"></div>
                <button onclick="window.expandirElemento('map')" class="absolute top-4 right-4 bg-black/60 p-2 rounded-lg text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">EXPANDIR MAPA</button>
            </div>

            <div class="glass p-6 group">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[9px] font-black uppercase text-zinc-600 italic">Gráfico de Comparação de Performance</h3>
                    <button onclick="window.expandirElemento('chart')" class="text-[9px] text-yellow-500 font-bold uppercase">Expandir Gráfico</button>
                </div>
                <div class="h-[300px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="modalExp" class="modal" onclick="window.fecharModal()">
        <div class="flex justify-between mb-4">
            <h2 class="text-yellow-500 font-black italic uppercase text-lg">Visualização Detalhada</h2>
            <span class="text-zinc-500 text-xs uppercase">Clique em qualquer lugar para fechar</span>
        </div>
