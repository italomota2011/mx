        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        async function iniciar() {
            if (!treinoId) {
                alert("ID do treino não encontrado na URL.");
                return;
            }

            try {
                const docRef = doc(db, "treinos", treinoId);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    document.getElementById('viewPista').innerText = "NÃO ENCONTRADO";
                    return;
                }

                dadosTreino = docSnap.data();
                document.getElementById('viewPista').innerText = (dadosTreino.pista || "PISTA").toUpperCase();
                document.getElementById('viewPiloto').innerText = (dadosTreino.piloto || "PILOTO").toUpperCase();

                // 1. Buscar Recordes da Pista
                const q = query(collection(db, "treinos"), where("pista", "==", dadosTreino.pista));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach(d => processarDados(d.data(), recordesPista));

                // 2. Processar Sessão Atual
                processarDados(dadosTreino, recordesSessao, true);

                renderizarTabela();
                initMap();
            } catch (error) {
                console.error(error);
                document.body.innerHTML += `<div style="color:red; position:fixed; top:0; background:white; z-index:9999">Erro: ${error.message}</div>`;
            }
