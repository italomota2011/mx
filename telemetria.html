<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Telemetria MX4</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>

        .chart-container { height: 180px; width: 100%; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid #333; }
        /* Scrollbar customizada para a lista de voltas */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

<body class="p-4 pb-10">
    <div class="max-w-5xl mx-auto">
        
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 id="pilotoNome" class="text-xl font-black italic uppercase text-yellow-500">Análise de Performance</h1>
                <p id="infoTreino" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest italic">Carregando dados...</p>
            </div>
            <button onclick="history.back()" class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-xl text-[10px] font-bold uppercase active:scale-95">Sair</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-2 rounded-[2.5rem] shadow-2xl">
                    <div id="map"></div>
                </div>

                <div class="glass p-5 rounded-[2.5rem]">
                    <h3 class="text-[9px] font-bold text-zinc-500 uppercase italic mb-4">Velocidade (km/h) vs Tempo</h3>
                    <div class="chart-container">
                        <canvas id="speedChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="glass p-4 rounded-2xl text-center">
                        <div class="text-[7px] text-zinc-500 font-bold uppercase mb-1 italic">V. Máxima</div>
                        <div id="vMax" class="text-lg font-black italic text-green-500">0</div>
                    </div>
                    <div class="glass p-4 rounded-2xl text-center">
                        <div class="text-[7px] text-zinc-500 font-bold uppercase mb-1 italic">V. Média</div>
                        <div id="vMed" class="text-lg font-black italic text-blue-500">0</div>
                    </div>
                </div>

                <div class="glass rounded-[2rem] overflow-hidden flex flex-col h-[400px]">
                    <div class="bg-zinc-900/50 p-4 border-b border-zinc-800">
                        <h3 class="text-[10px] font-black text-white uppercase italic tracking-tighter">Relatório de Voltas</h3>
                    </div>
                    <div id="listaVoltas" class="p-2 overflow-y-auto custom-scroll flex-1 space-y-2">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">

        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",

        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        async function carregarDados() {
            if (!treinoId) return;
            const docRef = doc(db, "treinos", treinoId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('pilotoNome').innerText = data.piloto;
                document.getElementById('infoTreino').innerText = `${data.pista} • ${new Date(data.data.seconds*1000).toLocaleDateString('pt-BR')}`;
                
                // Gerar Lista de Voltas
                renderVoltas(data.voltas);

                if (data.telemetria && data.telemetria.length > 0) {
                    processarTelemetria(data.telemetria);
                }
            }
        }

        function renderVoltas(voltas) {
            const container = document.getElementById('listaVoltas');
            const melhorTempo = [...voltas].sort()[0];
            
            container.innerHTML = voltas.map((tempo, index) => {
                const isBest = tempo === melhorTempo;
                return `
                    <div class="flex justify-between items-center p-3 rounded-xl ${isBest ? 'bg-yellow-500/10 border border-yellow-500/30' : 'bg-zinc-900/40 border border-zinc-800/50'}">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black italic ${isBest ? 'text-yellow-500' : 'text-zinc-600'}">${(index + 1).toString().padStart(2, '0')}</span>
                            <span class="text-xs font-bold uppercase italic ${isBest ? 'text-white' : 'text-zinc-400'}">Volta</span>
                        </div>
                        <div class="text-right">
                            ${isBest ? '<span class="text-[7px] block font-black text-yellow-500 uppercase leading-none mb-1">Recorde</span>' : ''}
                            <span class="text-sm font-black font-mono ${isBest ? 'text-yellow-500' : 'text-white'}">${tempo}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
