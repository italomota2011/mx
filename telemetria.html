<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.9); border: 1px solid #222; backdrop-filter: blur(10px); border-radius: 2rem; }
        #map { height: 250px; width: 100%; border-radius: 1.5rem; }
        /* MODAL FULLSCREEN */
        #modalZoom { display: none; position: fixed; inset: 0; background: #000; z-index: 100; padding: 20px; flex-direction: column; }
        #modalZoom.active { display: flex; }
        #fullCanvas { flex: 1; width: 100%; height: 100%; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 id="txtPiloto" class="text-2xl font-black italic uppercase text-yellow-500">Telemetria</h1>
            <p id="txtInfo" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest"></p>
        </div>
        <button onclick="history.back()" class="bg-zinc-900 px-4 py-2 rounded-xl text-[10px] font-bold border border-zinc-800">VOLTAR</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="glass p-2 cursor-pointer" onclick="abrirZoom('mapa')">
                <div id="map"></div>
                <p class="text-[9px] text-center text-zinc-600 mt-2 font-bold uppercase italic tracking-tighter">Clique no mapa para expandir análise</p>
            </div>

            <div class="glass p-5 cursor-pointer" onclick="abrirZoom('grafico')">
                <canvas id="speedChart" height="120"></canvas>
                <p class="text-[9px] text-center text-zinc-600 mt-2 font-bold uppercase italic tracking-tighter">Clique no gráfico para ver velocidades</p>
            </div>
        </div>

        <div class="glass p-4 h-fit">
            <h2 class="text-xs font-black uppercase italic mb-4 text-zinc-500">Tempos por Volta</h2>
            <div id="listaVoltas" class="space-y-2"></div>
        </div>
    </div>

    <div id="modalZoom">
        <div class="flex justify-between items-center mb-4">
            <h2 id="modalTitle" class="text-xl font-black italic uppercase text-yellow-500">Análise Detalhada</h2>
            <button onclick="fecharZoom()" class="bg-zinc-800 text-white px-6 py-2 rounded-full font-black uppercase text-xs">Fechar</button>
        </div>
        <div id="fullMap" class="hidden flex-1 rounded-3xl overflow-hidden"></div>
        <div id="fullChartContainer" class="hidden flex-1 bg-zinc-950 p-4 rounded-3xl">
            <canvas id="fullCanvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let dados = null;

        async function carregar() {
            const snap = await getDoc(doc(db, "treinos", treinoId));
            if (snap.exists()) {
                dados = snap.data();
                document.getElementById('txtPiloto').innerText = dados.piloto;
                document.getElementById('txtInfo').innerText = `${dados.pista} • ${new Date(dados.data.seconds*1000).toLocaleDateString()}`;
                
                const melhor = [...dados.voltas].sort()[0];
                document.getElementById('listaVoltas').innerHTML = dados.voltas.map((v, i) => `
                    <div class="flex justify-between p-3 rounded-2xl bg-zinc-900 border ${v === melhor ? 'border-yellow-500' : 'border-zinc-800'}">
                        <span class="text-xs font-bold text-zinc-600 italic">${i+1}ª</span>
                        <span class="font-mono font-bold ${v === melhor ? 'text-yellow-500' : 'text-white'}">${v}</span>
                    </div>
                `).join('');

                if (dados.telemetria) {
                    gerarMapa('map', 16);
                    gerarGrafico('speedChart');
                }
            }
        }

        function gerarMapa(divId, zoom) {
            const coords = dados.telemetria.map(p => [p.lat, p.lng]);
            const map = L.map(divId, {zoomControl: false}).setView(coords[0], zoom);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            for(let i=0; i<coords.length-1; i++) {
                const v = dados.telemetria[i].vel;
                const cor = v > 40 ? '#22c55e' : (v < 15 ? '#ef4444' : '#facc15');
                L.polyline([coords[i], coords[i+1]], {color: cor, weight: 6}).addTo(map);
            }
            map.fitBounds(coords);
        }

        function gerarGrafico(canvasId) {
            new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels: dados.telemetria.map(p => ""),
                    datasets: [{ data: dados.telemetria.map(p => p.vel), borderColor: '#facc15', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(250,204,21,0.1)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#111' } } } }
            });
        }

        window.abrirZoom = (tipo) => {
            const m = document.getElementById('modalZoom');
            m.classList.add('active');
            document.getElementById('fullMap').classList.add('hidden');
            document.getElementById('fullChartContainer').classList.add('hidden');

            if (tipo === 'mapa') {
                document.getElementById('fullMap').classList.remove('hidden');
                document.getElementById('fullMap').innerHTML = ""; 
                setTimeout(() => gerarMapa('fullMap', 18), 100);
            } else {
                document.getElementById('fullChartContainer').classList.remove('hidden');
                setTimeout(() => gerarGrafico('fullCanvas'), 100);
            }
        };

        window.fecharZoom = () => document.getElementById('modalZoom').classList.remove('active');

        carregar();
    </script>
</body>
</html>
