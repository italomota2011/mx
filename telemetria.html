<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetria MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; }
        #map { height: 350px; width: 100%; border-radius: 1rem; }
        .volta-item.ativa { border-color: #eab308; background: rgba(234, 179, 8, 0.15); }
    </style>
</head>
<body class="p-4">

    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h1 class="text-xl font-black italic text-yellow-500 uppercase">Análise de Performance</h1>
        <div class="flex gap-2">
            <select id="selectComparar" onchange="window.mudarComparacao()" class="bg-zinc-900 border border-zinc-700 text-[10px] p-2 rounded-lg font-bold uppercase text-white">
                <option value="">Comparar com...</option>
                <option value="melhor">Melhor Volta da Sessão</option>
                <option value="recorde">Recorde da Pista</option>
            </select>
            <button onclick="history.back()" class="bg-zinc-900 px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Sair</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <div class="lg:col-span-3 space-y-4">
            <div class="glass p-4">
                <h3 class="text-[9px] font-black text-zinc-600 uppercase italic mb-3">Voltas</h3>
                <div id="listaVoltas" class="space-y-2"></div>
            </div>
            <div class="glass p-4">
                <div class="flex justify-between text-[10px] font-bold">
                    <span class="text-red-500">● FREADA</span>
                    <span class="text-green-500">● ACELERAÇÃO</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-4">
            <div class="glass p-2"><div id="map"></div></div>
            <div class="glass p-6">
                <div class="h-[250px]"><canvas id="mainChart"></canvas></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let map, chart, marker;
        let dadosTreino, recordeGlobal, melhorVoltaIdx;
        let voltaAtualIdx = 0;

        async function init() {
            if (!treinoId) return;
            const snap = await getDoc(doc(db, "treinos", treinoId));
            if (!snap.exists()) return;
            dadosTreino = snap.data();
            
            // Acha o índice da melhor volta da sessão
            const tempos = dadosTreino.voltas || [];
            const melhorTempo = [...tempos].sort()[0];
            melhorVoltaIdx = tempos.indexOf(melhorTempo);

            renderLista(tempos, melhorTempo);
            renderMapa(dadosTreino.telemetria || []);
            window.compararVolta(0);
            
            // Busca recorde global
            const q = query(collection(db, "treinos"), where("pista", "==", dadosTreino.pista), orderBy("voltas", "asc"), limit(1));
            const snapRec = await getDocs(q);
            if(!snapRec.empty) recordeGlobal = snapRec.docs[0].data();
        }

        function extrairTelemetriaVolta(treino, idx) {
            if (!treino.marcasDeVolta || !treino.telemetria) return treino.telemetria || [];
            const inicio = treino.marcasDeVolta[idx] || 0;
            const fim = treino.marcasDeVolta[idx + 1] || treino.telemetria.length;
            return treino.telemetria.slice(inicio, fim);
        }

        window.compararVolta = function(idx) {
            voltaAtualIdx = idx;
            document.querySelectorAll('.volta-item').forEach(el => el.classList.remove('ativa'));
            document.getElementById(`volta-${idx}`)?.classList.add('ativa');
            window.mudarComparacao();
        };

        window.mudarComparacao = function() {
            const comp = document.getElementById('selectComparar').value;
            const dadosPrincipal = extrairTelemetriaVolta(dadosTreino, voltaAtualIdx);
            let dadosRef = null;

            if (comp === 'melhor') dadosRef = extrairTelemetriaVolta(dadosTreino, melhorVoltaIdx);
            else if (comp === 'recorde' && recordeGlobal) dadosRef = recordeGlobal.telemetria;

            renderGrafico(dadosPrincipal, dadosRef);
        };

        function renderGrafico(dA, dB) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();

            const datasets = [{
                label: 'Volta Atual',
                data: dA.map(p => p.vel),
                borderColor: '#eab308',
                borderWidth: 3,
                pointRadius: 0,
                tension: 0.3
            }];

            if (dB) {
                datasets.push({
                    label: 'Comparação',
                    data: dB.map(p => p.vel),
                    borderColor: 'rgba(255, 255, 255, 0.4)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    tension: 0.3
                });
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: dA.map((_, i) => i), datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { grid: { color: '#111' } } },
                    onHover: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            if(dA[i]) marker.setLatLng([dA[i].lat, dA[i].lng]);
                        }
                    }
                }
            });
        }

        function renderMapa(pontos) {
            if (map) map.remove();
            if (!pontos.length) return;
            map = L.map('map', { zoomControl: false }).setView([pontos[0].lat, pontos[0].lng], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            for (let i = 1; i < pontos.length; i++) {
                const p1 = pontos[i-1]; const p2 = pontos[i];
                const v = parseFloat(p2.vel);
                const cor = v > 60 ? '#22c55e' : (v > 30 ? '#eab308' : '#ef4444');
                L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], { color: cor, weight: 5 }).addTo(map);
            }
            marker = L.circleMarker([pontos[0].lat, pontos[0].lng], { radius: 6, color: '#fff', fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            map.fitBounds(L.polyline(pontos.map(p => [p.lat, p.lng])).getBounds());
        }

        function renderLista(voltas, melhor) {
            document.getElementById('listaVoltas').innerHTML = voltas.map((v, i) => `
                <div onclick="window.compararVolta(${i})" id="volta-${i}" class="volta-item glass border-zinc-900 p-3 flex justify-between items-center cursor-pointer">
                    <span class="text-xs font-bold">Volta ${i+1}</span>
                    <span class="font-mono text-xs ${v === melhor ? 'text-yellow-500' : ''}">${v}</span>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
