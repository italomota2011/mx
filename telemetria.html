<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetria MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; border-radius: 2rem; border: 1px solid #222; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .sector-table { border-collapse: separate; border-spacing: 0 4px; }
        .bg-bom { background-color: #dc2626 !important; color: white !important; } /* Vermelho */
        .bg-inter { background-color: #eab308 !important; color: black !important; } /* Amarelo */
        .text-ruim { color: #71717a !important; } /* Cinza */
        .row-selected { outline: 2px solid #fff; background-color: #111 !important; }
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="app-container" class="p-4 h-full flex flex-col gap-3">
        <div class="flex justify-between items-center bg-zinc-950 p-4 rounded-[2rem] border border-zinc-900 shadow-xl">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="bg-zinc-900 w-10 h-10 flex items-center justify-center rounded-xl text-zinc-400 text-xl font-bold">←</button>
                <div>
                    <h1 id="viewPista" class="text-white font-black italic uppercase text-lg leading-none">CARREGANDO...</h1>
                    <p id="viewPiloto" class="text-zinc-600 text-[9px] font-bold uppercase mt-1">Sincronizando dados</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="baseComparacao" onchange="renderizarTabela()" class="bg-zinc-900 text-[10px] font-bold px-3 py-2 rounded-xl border border-zinc-800 text-white outline-none">
                    <option value="sessao">Comparar: Melhor Sessão</option>
                    <option value="pista">Comparar: Recorde Pista</option>
                </select>
                <button onclick="toggleFS()" class="bg-zinc-800 text-[10px] font-black px-4 py-2 rounded-xl text-yellow-500 uppercase">⛶</button>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-12 gap-3 overflow-hidden">
            <div class="col-span-7 bg-zinc-950 p-4 rounded-[2.5rem] border border-zinc-900 overflow-y-auto">
                <table class="w-full sector-table text-[11px]">
                    <thead>
                        <tr class="text-zinc-700 uppercase italic font-black text-[8px] text-center">
                            <th class="pb-3 text-left">LAP</th>
                            <th>S1</th><th>S2</th><th>S3</th><th>S4</th>
                            <th class="pb-3 text-right">TIME</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaVoltas" class="text-center font-mono font-bold"></tbody>
                </table>
            </div>
            <div class="col-span-5 h-full">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let map, polyline, dadosTreino, voltasFinal = [];
        let recordesSessao = [999, 999, 999, 999];
        let recordesPista = [999, 999, 999, 999];

        async function carregar() {
            console.log("Iniciando busca do ID:", treinoId);
            if (!treinoId) return;

            try {
                const docRef = db.collection("treinos").doc(treinoId);
                const docSnap = await docRef.get();

                if (!docSnap.exists) {
                    document.getElementById('viewPista').innerText = "NÃO ENCONTRADO";
                    return;
                }

                dadosTreino = docSnap.data();
                document.getElementById('viewPista').innerText = (dadosTreino.pista || "PISTA").toUpperCase();
                document.getElementById('viewPiloto').innerText = (dadosTreino.piloto || "PILOTO").toUpperCase();

                // Busca Recordes da Pista
                const qs = await db.collection("treinos").where("pista", "==", dadosTreino.pista).get();
                qs.forEach(d => processarS(d.data(), recordesPista));

                // Processa Sessão Atual
                processarS(dadosTreino, recordesSessao, true);

                renderizarTabela();
                initMap();
            } catch (e) {
                console.error("Erro Firebase:", e);
                document.getElementById('viewPista').innerText = "ERRO DE CARREGAMENTO";
            }
        }

        function processarS(t, arrAlvo, salvar = false) {
            const marcas = t.marcasDeVolta || [];
            const tele = t.telemetria || [];
            for (let i = 0; i < marcas.length - 1; i++) {
                const r = tele.slice(marcas[i], marcas[i+1]);
                if (r.length < 5) continue;
                const q = Math.floor(r.length / 4);
                const s = [(r[q].ts-r[0].ts)/1000, (r[q*2].ts-r[q].ts)/1000, (r[q*3].ts-r[q*2].ts)/1000, (r[r.length-1].ts-r[q*3].ts)/1000];
                s.forEach((v, idx) => { if (v < arrAlvo[idx]) arrAlvo[idx] = v; });
                if (salvar) voltasFinal.push({ s, tempo: t.voltas[i], r });
            }
        }

        window.renderizarTabela = function() {
            const ref = document.getElementById('baseComparacao').value === 'pista' ? recordesPista : recordesSessao;
            const tbody = document.getElementById('tabelaVoltas');
            tbody.innerHTML = "";

            voltasFinal.forEach((v, i) => {
                const tr = document.createElement('tr');
                tr.className = "row-volta bg-zinc-900/40 rounded-xl cursor-pointer";
                tr.onclick = () => {
                    document.querySelectorAll('.row-volta').forEach(r => r.classList.remove('row-selected'));
                    tr.classList.add('row-selected');
                    if(polyline) map.removeLayer(polyline);
                    polyline = L.polyline(v.r.map(p => [p.lat, p.lng]), { color: '#fff', weight: 4 }).addTo(map);
                    map.fitBounds(polyline.getBounds(), { padding: [30, 30] });
                };

                let cols = `<td class="p-3 text-left text-zinc-700">${i+1}</td>`;
                v.s.forEach((val, idx) => {
                    let c = "text-ruim"; // CINZA
                    const d = val - ref[idx];
                    if (d <= 0.005) c = "bg-bom rounded-lg"; // VERMELHO
                    else if (d <= 0.5) c = "bg-inter rounded-lg"; // AMARELO
                    cols += `<td class="p-3 ${c}">${val.toFixed(3)}</td>`;
                });
                tr.innerHTML = cols + `<td class="p-3 text-right text-white">${v.tempo}</td>`;
                tbody.appendChild(tr);
            });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            if (dadosTreino.telemetria && dadosTreino.telemetria[0]) {
                map.setView([dadosTreino.telemetria[0].lat, dadosTreino.telemetria[0].lng], 17);
            }
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        carregar();
    </script>
</body>
</html>
