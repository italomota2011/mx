<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 1.5rem; }
        #map { height: 350px; width: 100%; border-radius: 1rem; background: #0a0a0a; }
        .chart-container { height: 250px; position: relative; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 id="txtPiloto" class="text-2xl font-black italic uppercase text-yellow-500">TELEMETRIA</h1>
            <p id="txtInfo" class="text-[10px] text-zinc-500 font-bold uppercase"></p>
        </div>
        <button onclick="history.back()" class="bg-zinc-900 border border-zinc-800 px-6 py-2 rounded-xl text-[10px] font-black uppercase italic">Voltar</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="lg:col-span-1 glass p-4">
            <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-4 text-center">Tempos Registrados</h3>
            <div id="listaVoltas" class="space-y-2"></div>
        </div>

        <div class="lg:col-span-3 glass p-2">
            <div id="map"></div>
            <div id="avisoGps" class="hidden text-center p-10 text-zinc-700 text-xs font-bold uppercase italic">
                Nenhum dado de GPS encontrado neste treino.<br>
                <span class="text-[9px] opacity-50">Grave um novo treino com a versão atualizada do app.</span>
            </div>
        </div>

        <div class="lg:col-span-4 glass p-6">
            <div class="chart-container">
                <canvas id="compChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        async function init() {
            if (!treinoId) return;
            const snap = await getDoc(doc(db, "treinos", treinoId));
            if (!snap.exists()) return;
            const dados = snap.data();

            document.getElementById('txtPiloto').innerText = dados.piloto || "PILOTO";
            document.getElementById('txtInfo').innerText = `${dados.pista} • ${dados.totalSessao || ''}`;

            // Renderizar Voltas
            document.getElementById('listaVoltas').innerHTML = (dados.voltas || []).map((v, i) => `
                <div class="glass border-zinc-900 p-3 flex justify-between items-center rounded-xl">
                    <span class="text-[10px] font-black text-zinc-600 italic">${i+1}ª</span>
                    <span class="font-mono text-sm font-bold text-white">${v}</span>
                </div>
            `).join('');

            // Verificar se existe telemetria
            if (!dados.telemetria || dados.telemetria.length === 0) {
                document.getElementById('map').classList.add('hidden');
                document.getElementById('avisoGps').classList.remove('hidden');
                return;
            }

            // Se houver dados, desenhar mapa e gráfico
            renderMapa(dados.telemetria);
            renderGrafico(dados.telemetria);
        }

        function renderMapa(pontos) {
            const coords = pontos.map(p => [p.lat, p.lng]);
            const map = L.map('map', { zoomControl: false }).setView(coords[0], 16);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            const track = L.polyline(coords, {color: '#eab308', weight: 5, opacity: 0.8}).addTo(map);
            map.fitBounds(track.getBounds(), { padding: [30, 30] });
            
            // Corrige o bug da tela preta/cinza no mapa
            setTimeout(() => { map.invalidateSize(); }, 400);
        }

        function renderGrafico(pontos) {
            const ctx = document.getElementById('compChart');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: pontos.map((_, i) => i),
                    datasets: [{
                        label: 'KM/H',
                        data: pontos.map(p => p.vel),
                        borderColor: '#eab308',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(234, 179, 8, 0.05)',
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: '#111' }, ticks: { color: '#444', font: { size: 9 } } }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
