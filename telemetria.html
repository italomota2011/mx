<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; }
        #map { height: 400px; width: 100%; border-radius: 1rem; z-index: 1; }
        .volta-item.ativa { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; }
        .modal.active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="p-4">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase">TELEMETRIA PRO</h1>
            <p id="txtInfo" class="text-[10px] text-zinc-500 font-bold uppercase mt-1">Carregando...</p>
        </div>
        
        <div class="flex gap-2">
            <select id="selectComparar" onchange="window.mudarComparacao()" class="bg-zinc-900 border border-zinc-700 text-[10px] p-2 rounded-lg font-bold uppercase text-white">
                <option value="">Comparar com...</option>
                <option value="melhor">Melhor Volta da Sessão</option>
                <option value="recorde">Recorde da Pista (Global)</option>
            </select>
            <button onclick="history.back()" class="bg-zinc-900 border border-zinc-800 px-6 py-2 rounded-xl text-[10px] font-black uppercase italic">Sair</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <div class="lg:col-span-3 space-y-4">
            <div class="glass p-4">
                <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-3 italic">Voltas</h3>
                <div id="listaVoltas" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
            <div class="glass p-4 text-[10px] font-bold">
                <p class="text-zinc-600 uppercase mb-2">Legenda de Velocidade</p>
                <div class="flex items-center gap-2 mb-1"><div class="w-3 h-3 bg-green-500 rounded-full"></div> Aceleração / Alta</div>
                <div class="flex items-center gap-2 mb-1"><div class="w-3 h-3 bg-yellow-500 rounded-full"></div> Contorno / Média</div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 bg-red-500 rounded-full"></div> Frenagem / Lenta</div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-4">
            <div class="glass p-2 relative group"><div id="map"></div></div>
            <div class="glass p-6">
                <div class="h-[300px]"><canvas id="mainChart"></canvas></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let map, chart, marker;
        let dadosTreino, recordeGlobal, melhorVoltaSessao;
        let voltaAtualIdx = 0;

        async function init() {
            if (!treinoId) return;
            const snap = await getDoc(doc(db, "treinos", treinoId));
            if (!snap.exists()) return;
            dadosTreino = snap.data();
            
            document.getElementById('txtInfo').innerText = `${dadosTreino.pista} | ${dadosTreino.piloto}`;

            // Identifica melhor volta da sessão
            const tempos = dadosTreino.voltas || [];
            const melhorTempo = [...tempos].sort()[0];
            melhorVoltaSessao = tempos.indexOf(melhorTempo);

            renderLista(tempos, melhorTempo);
            renderMapa(dadosTreino.telemetria);
            window.compararVolta(0);
            buscarRecordeGlobal(dadosTreino.pista);
        }

        async function buscarRecordeGlobal(pistaNome) {
            const q = query(collection(db, "treinos"), where("pista", "==", pistaNome), orderBy("totalSessao", "asc"), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) recordeGlobal = snap.docs[0].data();
        }

        function getDadosVolta(treino, idx) {
            if (!treino.marcasDeVolta || !treino.telemetria) return treino.telemetria;
            const inicio = treino.marcasDeVolta[idx];
            const fim = treino.marcasDeVolta[idx + 1] || treino.telemetria.length;
            return treino.telemetria.slice(inicio, fim);
        }

        window.compararVolta = function(idx) {
            voltaAtualIdx = idx;
            document.querySelectorAll('.volta-item').forEach(el => el.classList.remove('ativa'));
            document.getElementById(`volta-${idx}`)?.classList.add('ativa');
            window.mudarComparacao(); 
        };

        window.mudarComparacao = function() {
            const compTipo = document.getElementById('selectComparar').value;
            const telePrincipal = getDadosVolta(dadosTreino, voltaAtualIdx);
            let teleComparacao = null;

            if (compTipo === 'melhor') {
                teleComparacao = getDadosVolta(dadosTreino, melhorVoltaSessao);
            } else if (compTipo === 'recorde' && recordeGlobal) {
                teleComparacao = recordeGlobal.telemetria; 
            }

            atualizarGrafico(telePrincipal, teleComparacao);
        };

        function atualizarGrafico(dadosA, dadosB) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();

            const datasets = [{
                label: 'Volta Selecionada',
                data: dadosA.map(p => p.vel),
                borderColor: '#eab308',
                borderWidth: 3,
                pointRadius: 0,
                tension: 0.3
            }];

            if (dadosB) {
                datasets.push({
                    label: 'Comparação',
                    data: dadosB.map(p => p.vel),
                    borderColor: 'rgba(255, 255, 255, 0.5)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    tension: 0.3
                });
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: (dadosA.length > (dadosB?.length || 0) ? dadosA : dadosB).map((_, i) => i), datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#111' } }, x: { display: false } },
                    onHover: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            const p = dadosA[i] || dadosA[dadosA.length-1];
                            marker.setLatLng([p.lat, p.lng]);
                        }
                    }
                }
            });
        }

        function renderMapa(pontos) {
            if (map) map.remove();
            map = L.map('map', { zoomControl: false }).setView([pontos[0].lat, pontos[0].lng], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            for (let i = 1; i < pontos.length; i++) {
                const p1 = pontos[i-1]; const p2 = pontos[i];
                const vel = parseFloat(p2.vel);
                const cor = vel > 60 ? '#22c55e' : (vel > 30 ? '#eab308' : '#ef4444');
                L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], { color: cor, weight: 5 }).addTo(map);
            }
            marker = L.circleMarker([pontos[0].lat, pontos[0].lng], { radius: 6, color: '#fff', fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            map.fitBounds(L.polyline(pontos.map(p => [p.lat, p.lng])).getBounds());
        }

        function renderLista(voltas, melhor) {
            document.getElementById('listaVoltas').innerHTML
