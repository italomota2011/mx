<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetria MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        #map { height: 350px; width: 100%; border-radius: 24px; z-index: 1; border: 1px solid #222; }
        .chart-container { height: 200px; width: 100%; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid #333; }
    </style>
</head>
<body class="p-4 pb-10">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 id="pilotoNome" class="text-xl font-black italic uppercase text-yellow-500 italic">Análise de Dados</h1>
                <p id="infoTreino" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest italic">Carregando telemetria...</p>
            </div>
            <button onclick="history.back()" class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Sair</button>
        </header>

        <div class="glass p-2 rounded-[2.5rem] mb-6 shadow-2xl">
            <div id="map"></div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="glass p-4 rounded-2xl text-center">
                <div class="text-[8px] text-zinc-500 font-bold uppercase mb-1">Vel. Máxima</div>
                <div id="vMax" class="text-lg font-black italic text-green-500">0 <span class="text-[10px]">km/h</span></div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <div class="text-[8px] text-zinc-500 font-bold uppercase mb-1">Vel. Média</div>
                <div id="vMed" class="text-lg font-black italic text-blue-500">0 <span class="text-[10px]">km/h</span></div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <div class="text-[8px] text-zinc-500 font-bold uppercase mb-1">Melhor Volta</div>
                <div id="bestLap" class="text-lg font-black italic text-yellow-500">--:--</div>
            </div>
        </div>

        <div class="glass p-5 rounded-[2.5rem] mb-6">
            <h3 class="text-[9px] font-bold text-zinc-500 uppercase italic mb-4">Gráfico de Velocidade vs Tempo</h3>
            <div class="chart-container">
                <canvas id="speedChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Pega o ID do treino pela URL
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        if (!treinoId) { alert("Treino não encontrado!"); location.href='historico.html'; }

        async function carregarDados() {
            const docRef = doc(db, "treinos", treinoId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('pilotoNome').innerText = data.piloto;
                document.getElementById('infoTreino').innerText = `${data.pista} • ${new Date(data.data.seconds*1000).toLocaleDateString()}`;
                document.getElementById('bestLap').innerText = [...data.voltas].sort()[0];

                if (data.telemetria && data.telemetria.length > 0) {
                    processarTelemetria(data.telemetria);
                }
            }
        }

        function processarTelemetria(rastro) {
            const coords = rastro.map(p => [p.lat, p.lng]);
            const velocidades = rastro.map(p => parseFloat(p.vel));
            const tempos = rastro.map(p => (p.ts / 1000).toFixed(1) + 's');

            // Estatísticas
            const vMax = Math.max(...velocidades);
            const vMed = (velocidades.reduce((a, b) => a + b, 0) / velocidades.length).toFixed(1);
            document.getElementById('vMax').innerHTML = `${vMax.toFixed(1)} <span class="text-[10px]">km/h</span>`;
            document.getElementById('vMed').innerHTML = `${vMed} <span class="text-[10px]">km/h</span>`;

            // Inicializar Mapa
            const map = L.map('map', { zoomControl: false }).setView(coords[0], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Desenhar traçado colorido (Simulando calor de velocidade)
            for (let i = 0; i < coords.length - 1; i++) {
                const cor = velocidades[i] > vMax * 0.7 ? '#22c55e' : (velocidades[i] < vMax * 0.3 ? '#ef4444' : '#facc15');
                L.polyline([coords[i], coords[i+1]], { color: cor, weight: 5, opacity: 0.8 }).addTo(map);
            }
            map.fitBounds(coords);

            // Gráfico
            const ctx = document.getElementById('speedChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: tempos,
                    datasets: [{
                        label: 'Velocidade (km/h)',
                        data: velocidades,
                        borderColor: '#facc15',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(250, 204, 21, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#222' }, ticks: { color: '#555', font: { size: 9 } } },
                        x: { grid: { display: false }, ticks: { color: '#555', font: { size: 9 } } }
                    }
                }
            });
        }

        carregarDados();
    </script>
</body>
</html>
