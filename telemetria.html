<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.9); border: 1px solid #222; backdrop-filter: blur(10px); border-radius: 2rem; }
        #map { height: 350px; width: 100%; border-radius: 1.5rem; background: #111; }
        #modalZoom { display: none; position: fixed; inset: 0; background: #000; z-index: 100; padding: 20px; flex-direction: column; }
        #modalZoom.active { display: flex; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 id="txtPiloto" class="text-3xl font-black italic uppercase text-yellow-500">CARREGANDO...</h1>
            <p id="txtInfo" class="text-xs text-zinc-500 font-bold uppercase tracking-widest"></p>
        </div>
        <button onclick="history.back()" class="bg-zinc-900 px-6 py-2 rounded-xl text-[10px] font-black border border-zinc-800 uppercase italic">Voltar</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            
            <div class="glass p-2 cursor-pointer" onclick="abrirZoom('mapa')">
                <div id="map"></div>
                <p class="text-[9px] text-center text-zinc-600 mt-2 font-bold uppercase italic">Clique no mapa para expandir análise</p>
            </div>

            <div class="glass p-6 cursor-pointer" onclick="abrirZoom('grafico')">
                <div style="height: 200px; position: relative;">
                    <canvas id="speedChart"></canvas>
                </div>
                <p class="text-[9px] text-center text-zinc-600 mt-4 font-bold uppercase italic">Clique no gráfico para ver detalhes de velocidade</p>
            </div>
        </div>

        <div class="glass p-6 h-fit">
            <h2 class="text-xs font-black uppercase italic mb-6 text-zinc-500 tracking-widest border-b border-zinc-900 pb-2">Tempos da Sessão</h2>
            <div id="listaVoltas" class="space-y-3">
                </div>
        </div>
    </div>

    <div id="modalZoom">
        <div class="flex justify-between items-center mb-4">
            <h2 id="modalTitle" class="text-xl font-black italic uppercase text-yellow-500 underline decoration-zinc-800">Análise Expandida</h2>
            <button onclick="fecharZoom()" class="bg-white text-black px-8 py-2 rounded-full font-black uppercase text-xs">Fechar</button>
        </div>
        <div id="fullMap" class="hidden flex-1 rounded-3xl overflow-hidden border border-zinc-800"></div>
        <div id="fullChartContainer" class="hidden flex-1 bg-zinc-950 p-6 rounded-3xl border border-zinc-800">
            <canvas id="fullCanvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let dados = null;

        async function carregarDados() {
            if(!treinoId) return;
            const snap = await getDoc(doc(db, "treinos", treinoId));
            
            if (snap.exists()) {
                dados = snap.data();
                document.getElementById('txtPiloto').innerText = dados.piloto;
                document.getElementById('txtInfo').innerText = `${dados.pista} • ${dados.data ? new Date(dados.data.seconds*1000).toLocaleDateString() : ''}`;
                
                // Renderizar Voltas
                const melhor = [...dados.voltas].sort()[0];
                document.getElementById('listaVoltas').innerHTML = dados.voltas.map((v, i) => `
                    <div class="flex justify-between items-center p-4 rounded-2xl bg-zinc-900/50 border ${v === melhor ? 'border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.1)]' : 'border-zinc-800'}">
                        <span class="text-[10px] font-black text-zinc-600 italic uppercase">${i+1}ª VOLTA</span>
                        <span class="font-mono text-lg font-bold ${v === melhor ? 'text-yellow-500' : 'text-white'}">${v}</span>
                    </div>
                `).join('');

                // Renderizar Telemetria se existir
                if (dados.telemetria && dados.telemetria.length > 0) {
                    initMapa('map', 16);
                    initGrafico('speedChart');
                } else {
                    document.getElementById('map').innerHTML = "<div class='h-full flex items-center justify-center text-zinc-700 font-bold italic uppercase text-xs'>Dados de GPS não encontrados para este treino</div>";
                }
            }
        }

        function initMapa(id, zoomLevel) {
            const container = document.getElementById(id);
            if(!container) return;
            container.innerHTML = ""; // Limpa antes de renderizar
            
            const coords = dados.telemetria.map(p => [p.lat, p.lng]);
            const map = L.map(id, { zoomControl: false }).setView(coords[0], zoomLevel);
            
            // Estilo de mapa escuro para combinar com o app
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Desenha a linha da pista
            const polyline = L.polyline(coords, {
                color: '#eab308',
                weight: 5,
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(map);

            map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
        }

        function initGrafico(id) {
            const ctx = document.getElementById(id).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dados.telemetria.map((_, i) => i),
                    datasets: [{
                        label: 'KM/H',
                        data: dados.telemetria.map(p => p.vel),
                        borderColor: '#eab308',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(234, 179, 8, 0.05)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { 
                            grid: { color: '#222' },
                            ticks: { color: '#555', font: { size: 10, weight: 'bold' } }
                        }
                    }
                }
            });
        }

        window.abrirZoom = (tipo) => {
            const modal = document.getElementById('modalZoom');
            modal.classList.add('active');
            document.getElementById('fullMap').classList.add('hidden');
            document.getElementById('fullChartContainer').classList.add('hidden');

            if (tipo === 'mapa') {
                document.getElementById('fullMap').classList.remove('hidden');
                setTimeout(() => initMapa('fullMap', 18), 100);
            } else {
                document.getElementById('fullChartContainer').classList.remove('hidden');
                setTimeout(() => {
                    const fullCtx = document.getElementById('fullCanvas').getContext('2d');
                    new Chart(fullCtx, {
                        type: 'line',
                        data: {
                            labels: dados.telemetria.map((_, i) => i),
                            datasets: [{
                                label: 'Velocidade',
                                data: dados.telemetria.map(p => p.vel),
                                borderColor: '#eab308',
                                fill: true,
                                backgroundColor: 'rgba(234, 179, 8, 0.1)',
                                tension: 0.1,
                                pointRadius: 2,
                                pointBackgroundColor: '#eab308'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { grid: { color: '#333' }, ticks: { color: '#fff' } },
                                x: { display: false }
                            }
                        }
                    });
                }, 100);
            }
        };

        window.fecharZoom = () => document.getElementById('modalZoom').classList.remove('active');

        carregarDados();
    </script>
</body>
</html>
