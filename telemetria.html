<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetria MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; border-radius: 2rem; border: 1px solid #222; background: #050505; }
        
        @media screen and (orientation: portrait) {
            #app-container { 
                transform: rotate(90deg); transform-origin: center; 
                width: 100dvh; height: 100vw; 
                position: absolute; top: 50%; left: 50%; translate: -50% -50%; 
            }
        }

        .sector-table { border-collapse: separate; border-spacing: 0 4px; }
        
        /* Cores de Performance */
        .status-bom { background-color: #dc2626 !important; color: white !important; border-radius: 0.5rem; } /* Vermelho */
        .status-medio { background-color: #eab308 !important; color: black !important; border-radius: 0.5rem; } /* Amarelo */
        .status-ruim { color: #71717a !important; } /* Cinza */
        
        .row-selected { outline: 2px solid #fff; background-color: #111 !important; }
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>

            <div class="flex items-center gap-4">
