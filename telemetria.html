<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetria Avançada - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; }
        #map { height: 400px; width: 100%; border-radius: 1rem; cursor: crosshair; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
        .modal.active { display: flex; flex-direction: column; }
        .volta-item.ativa { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
    </style>
</head>
<body class="p-4">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase leading-none">TELEMETRIA PRO</h1>
            <p id="txtInfo" class="text-[10px] text-zinc-500 font-bold uppercase mt-1"></p>
        </div>
        
        <div class="flex gap-2">
            <select id="selectComparar" onchange="window.mudarComparacaoRapida()" class="bg-zinc-900 border border-zinc-700 text-[10px] p-2 rounded-lg font-bold uppercase text-white">
                <option value="">Comparar com...</option>
                <option value="melhor">Melhor Volta da Sessão</option>
            </select>
            <button onclick="history.back()" class="bg-zinc-900 border border-zinc-800 px-6 py-2 rounded-xl text-[10px] font-black uppercase italic">Voltar</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <div class="lg:col-span-3 space-y-4">
            <div class="glass p-4">
                <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-3 italic">Voltas Gravadas</h3>
                <div id="listaVoltas" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
            
            <div class="glass p-4">
                <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-2 italic">Análise de G-Force</h3>
                <div class="flex justify-between text-[10px] font-bold">
                    <span class="text-red-500 italic">● FRENAGEM</span>
                    <span class="text-green-500 italic">● ACELERAÇÃO</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-4">
            <div class="glass p-2 relative group">
                <div id="map"></div>
                <button onclick="window.expandirElemento('map')" class="absolute top-4 right-4 bg-black/60 p-2 rounded-lg text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">EXPANDIR MAPA</button>
            </div>

            <div class="glass p-6 group">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[9px] font-black uppercase text-zinc-600 italic">Gráfico de Comparação de Performance</h3>
                    <button onclick="window.expandirElemento('chart')" class="text-[9px] text-yellow-500 font-bold uppercase">Expandir Gráfico</button>
                </div>
                <div class="h-[300px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="modalExp" class="modal" onclick="window.fecharModal()">
        <div class="flex justify-between mb-4">
            <h2 class="text-yellow-500 font-black italic uppercase text-lg">Visualização Detalhada</h2>
            <span class="text-zinc-500 text-xs uppercase">Clique em qualquer lugar para fechar</span>
        </div>
        <div id="modalContent" class="flex-1 w-full h-full"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let map, chart, marker;
        let telemetriaGeral = [];
        let voltaSelecionadaIdx = 0;

        async function init() {
            if (!treinoId) return;
            const snap = await getDoc(doc(db, "treinos", treinoId));
            if (!snap.exists()) return;
            const dados = snap.data();
            
            telemetriaGeral = dados.telemetria || [];
            document.getElementById('txtInfo').innerText = `${dados.pista} | ${dados.piloto}`;

            renderLista(dados.voltas);
            renderMapa(telemetriaGeral);
            window.compararVolta(0); // Inicia com a primeira volta
        }

        function renderLista(voltas = []) {
            const container = document.getElementById('listaVoltas');
            const melhorTempo = [...voltas].sort()[0];

            container.innerHTML = voltas.map((v, i) => `
                <div onclick="window.compararVolta(${i})" id="volta-${i}" class="volta-item glass border-zinc-900 p-3 flex justify-between items-center cursor-pointer hover:border-zinc-700 transition-all">
                    <div>
                        <p class="text-[8px] font-black text-zinc-500 uppercase italic">Volta ${i+1}</p>
                        <p class="font-mono text-sm font-bold text-white">${v}</p>
                    </div>
                    ${v === melhorTempo ? '<span class="text-[8px] bg-yellow-500 text-black px-2 py-1 rounded font-black">MELHOR</span>' : ''}
                </div>
            `).join('');
        }

        window.compararVolta = function(idx) {
            voltaSelecionadaIdx = idx;
            // Remove destaque de todas e adiciona na clicada
            document.querySelectorAll('.volta-item').forEach(el => el.classList.remove('ativa'));
            document.getElementById(`volta-${idx}`)?.classList.add('ativa');

            atualizarGrafico(idx);
        };

        window.mudarComparacaoRapida = function() {
            const modo = document.getElementById('selectComparar').value;
            if (modo === 'melhor') {
                // Lógica simplificada: Compara a selecionada com a volta 0 por enquanto
                atualizarGrafico(voltaSelecionadaIdx, 0); 
            } else {
                atualizarGrafico(voltaSelecionadaIdx);
            }
        };

        function renderMapa(pontos) {
            if (map) map.remove();
            const coords = pontos.map(p => [p.lat, p.lng]);
            map = L.map('map', { zoomControl: false }).setView(coords[0], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Rastro com cores de performance (Simplificado para o exemplo)
            const track = L.polyline(coords, { color: '#eab308', weight: 4, opacity: 0.6 }).addTo(map);
            marker = L.circleMarker(coords[0], { radius: 6, color: '#fff', fillColor: '#eab308', fillOpacity: 1 }).addTo(map);
            map.fitBounds(track.getBounds());
        }

        function atualizarGrafico(idxPrincipal, idxComparacao = null) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();

            // Aqui você filtraria os dados da telemetria por volta se tivesse os timestamps de início/fim
            // Para este exemplo, usaremos a telemetria geral
            const datasetPrincipal = {
                label: `Volta ${idxPrincipal + 1}`,
                data: telemetriaGeral.map(p => p.vel),
                borderColor: '#eab308',
                borderWidth: 3,
                pointRadius: 0,
                tension: 0.4
            };

            const datasets = [datasetPrincipal];

            if (idxComparacao !== null) {
                datasets.push({
                    label: `Comparação (Volta ${idxComparacao + 1})`,
                    data: telemetriaGeral.map(p => p.vel * 0.95), // Simulação de comparação
                    borderColor: 'rgba(255, 255, 255, 0.3)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    tension: 0.4
                });
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: telemetriaGeral.map(p => ""),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#111' }, ticks: { color: '#444' } },
                        x: { display: false }
                    },
                    onHover: (event, elements) => {
                        if (elements.length > 0) {
                            const i = elements[0].index;
                            const p = telemetriaGeral[i];
                            marker.setLatLng([p.lat, p.lng]);
                        }
                    }
                }
            });
        }

        window.expandirElemento = (tipo) => {
            const modal = document.getElementById('modalExp');
            const content = document.getElementById('modalContent');
            modal.classList.add('active');
            content.innerHTML = tipo === 'map' ? '<div id="mapClone" class="w-full h-full"></div>' : '<canvas id="chartClone"></canvas>';
            // Lógica de clonagem simplificada...
        };

        window.fecharModal = () => document.getElementById('modalExp').classList.remove('active');

        init();
    </script>
</body>
</html>
