<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        #map { height: 300px; width: 100%; border-radius: 1.5rem; border: 1px solid #222; }
        .sector-table { border-collapse: separate; border-spacing: 0 4px; }
        .bg-sector-fast { background-color: #9333ea; } /* Roxo - Recorde */
        .bg-sector-personal { background-color: #16a34a; } /* Verde - Melhor Pessoal */
        .bg-sector-normal { background-color: #ef4444; } /* Vermelho - Normal */
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; overflow-y: auto; }
        }
    </style>
</head>
<body>
    <div id="app-container" class="p-4 flex flex-col gap-4">
        <div class="flex justify-between items-center bg-zinc-900/50 p-4 rounded-3xl border border-zinc-800">
            <div>
                <h1 id="viewPista" class="text-yellow-500 font-black italic uppercase text-lg">---</h1>
                <p id="viewPiloto" class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">---</p>
            </div>
            <div class="flex flex-col items-end">
                <select id="selectComparativo" class="bg-black text-white text-[10px] font-bold border border-zinc-700 rounded-lg p-1 outline-none">
                    <option value="sessao">Comparar: Melhor da Sessão</option>
                    <option value="recorde">Comparar: Recorde da Pista</option>
                </select>
                <button onclick="window.history.back()" class="mt-2 text-zinc-600 text-[10px] font-black uppercase italic">← Voltar</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="bg-zinc-950 p-4 rounded-[2rem] border border-zinc-900 overflow-x-auto">
                <table class="w-full sector-table text-[10px]">
                    <thead>
                        <tr class="text-zinc-600 uppercase italic font-black">
                            <th class="p-2 text-left">LAP</th>
                            <th class="p-2 text-center">S1</th>
                            <th class="p-2 text-center">S2</th>
                            <th class="p-2 text-center">S3</th>
                            <th class="p-2 text-right">TIME</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaVoltas">
                        </tbody>
                </table>
            </div>

            <div class="flex flex-col gap-2">
                <div id="map"></div>
                <div class="flex justify-between px-2">
                    <span id="infoVoltaSelect" class="text-[10px] font-black italic text-zinc-500 uppercase tracking-tighter">Selecione uma volta para analisar</span>
                    <span id="infoGap" class="text-[10px] font-black italic text-red-500 uppercase tracking-tighter"></span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let map, polyline;
        let dadosTreino, melhorSessao, recordePista;

        async function inicializar() {
            if (!treinoId) return;

            // Carrega o treino atual
            const docRef = doc(db, "treinos", treinoId);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                dadosTreino = docSnap.data();
                document.getElementById('viewPista').innerText = dadosTreino.pista;
                document.getElementById('viewPiloto').innerText = dadosTreino.piloto;
                
                processarVoltas();
                initMap();
            }
        }

        function processarVoltas() {
            const tbody = document.getElementById('tabelaVoltas');
            const marcas = dadosTreino.marcasDeVolta || []; //
            const tele = dadosTreino.telemetria || []; //
            
            tbody.innerHTML = "";

            // Lógica para dividir em 3 setores por volta (divisão proporcional do rastro da volta)
            for (let i = 0; i < marcas.length - 1; i++) {
                const inicioIdx = marcas[i];
                const fimIdx = marcas[i+1];
                const rastroVolta = tele.slice(inicioIdx, fimIdx);
                
                // Dividindo a volta em 3 setores iguais em quantidade de pontos de GPS
                const terco = Math.floor(rastroVolta.length / 3);
                
                const s1 = rastroVolta[terco].ts - rastroVolta[0].ts;
                const s2 = rastroVolta[terco*2].ts - rastroVolta[terco].ts;
                const s3 = rastroVolta[rastroVolta.length-1].ts - rastroVolta[terco*2].ts;
                const tempoTotal = dadosTreino.voltas[i];

                const tr = document.createElement('tr');
                tr.className = "bg-zinc-900/40 cursor-pointer active:scale-[0.98] transition-all";
                tr.onclick = () => plotarVoltaNoMapa(rastroVolta, i+1);
                
                tr.innerHTML = `
                    <td class="p-3 font-black italic text-zinc-500">${i+1}</td>
                    <td class="p-3 text-center font-mono font-bold bg-sector-normal rounded-l-lg">${(s1/1000).toFixed(3)}</td>
                    <td class="p-3 text-center font-mono font-bold bg-sector-normal">${(s2/1000).toFixed(3)}</td>
                    <td class="p-3 text-center font-mono font-bold bg-sector-normal rounded-r-lg">${(s3/1000).toFixed(3)}</td>
                    <td class="p-3 text-right font-black italic text-white">${tempoTotal}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            if (dadosTreino.telemetria.length > 0) {
                const lastPos = [dadosTreino.telemetria[0].lat, dadosTreino.telemetria[0].lng];
                map.setView(lastPos, 17);
            }
        }

        function plotarVoltaNoMapa(rastro, numVolta) {
            if (polyline) map.removeLayer(polyline);
            
            const pontos = rastro.map(p => [p.lat, p.lng]);
            polyline = L.polyline(pontos, {
                color: '#eab308',
                weight: 4,
                opacity: 0.8,
                smoothFactor: 1
            }).addTo(map);
            
            map.fitBounds(polyline.getBounds());
            document.getElementById('infoVoltaSelect').innerText = `Analisando Volta ${numVolta}`;
        }

        inicializar();
    </script>
</body>
</html>
