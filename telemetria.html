<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetria Avançada - MX4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; }
        #map { height: 400px; width: 100%; border-radius: 1rem; cursor: crosshair; z-index: 1; }
        .volta-item.ativa { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
        
        /* Estilo para o Modal Expandido */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; }
        .modal.active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="p-4">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase leading-none">TELEMETRIA PRO</h1>
            <p id="txtInfo" class="text-[10px] text-zinc-500 font-bold uppercase mt-1">Carregando dados...</p>
        </div>
        
        <div class="flex gap-2">
            <select id="selectComparar" onchange="window.mudarComparacao()" class="bg-zinc-900 border border-zinc-700 text-[10px] p-2 rounded-lg font-bold uppercase text-white">
                <option value="">Comparar com...</option>
                <option value="melhor">Melhor Volta da Sessão</option>
                <option value="recorde">Recorde da Pista (Global)</option>
            </select>
            <button onclick="history.back()" class="bg-zinc-900 border border-zinc-800 px-6 py-2 rounded-xl text-[10px] font-black uppercase italic">Voltar</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <div class="lg:col-span-3 space-y-4">
            <div class="glass p-4">
                <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-3 italic">Voltas Gravadas</h3>
                <div id="listaVoltas" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
            
            <div class="glass p-4">
                <h3 class="text-[9px] font-black uppercase text-zinc-600 mb-2 italic">Análise de Performance</h3>
                <div class="flex justify-between text-[10px] font-bold">
                    <span class="text-red-500 italic">● FRENAGEM</span>
                    <span class="text-green-500 italic">● ACELERAÇÃO</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-4">
            <div class="glass p-2 relative group">
                <div id="map"></div>
                <button onclick="window.expandir('map')" class="absolute top-4 right-4 z-[10] bg-black/60 p-2 rounded-lg text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">EXPANDIR MAPA</button>
            </div>

            <div class="glass p-6 group relative">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[9px] font-black uppercase text-zinc-600 italic">Gráfico de Comparação</h3>
                    <button onclick="window.expandir('chart')" class="text-[9px] text-yellow-500 font-bold uppercase">Expandir Gráfico</button>
                </div>
                <div class="h-[300px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="modalExp" class="modal">
        <div class="flex justify-between mb-4">
            <h2 class="text-yellow-500 font-black italic uppercase text-lg" id="modalTitle">Análise</h2>
            <button onclick="window.fecharModal()" class="text-white font-bold text-xl">✕</button>
        </div>
        <div id="modalContent" class="flex-1 w-full h-full"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        let map, chart, marker;
        let dadosTreino, recordeGlobal;

        async function init() {
            if (!treinoId) return;
            const snap = await getDoc(doc(db, "treinos", treinoId));
            if (!snap.exists()) return;
            dadosTreino = snap.data();
            
            document.getElementById('txtInfo').innerText = `${dadosTreino.pista} | Piloto: ${dadosTreino.piloto}`;

            renderLista(dadosTreino.voltas);
            renderMapa(dadosTreino.telemetria);
            window.compararVolta(0); 
            
            // Busca o Recorde da Pista Global
            buscarRecordeGlobal(dadosTreino.pista);
        }

        async function buscarRecordeGlobal(pistaNome) {
            const q = query(collection(db, "treinos"), where("pista", "==", pistaNome), orderBy("totalSessao", "asc"), limit(1));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                recordeGlobal = querySnapshot.docs[0].data();
            }
        }

        function renderLista(voltas = []) {
            const container = document.getElementById('listaVoltas');
            const melhorTempo = [...voltas].sort()[0];
            container.innerHTML = voltas.map((v, i) => `
                <div onclick="window.compararVolta(${i})" id="volta-${i}" class="volta-item glass border-zinc-900 p-3 flex justify-between items-center cursor-pointer">
                    <div>
                        <p class="text-[8px] font-black text-zinc-500 uppercase italic">Volta ${i+1}</p>
                        <p class="font-mono text-sm font-bold">${v}</p>
                    </div>
                    ${v === melhorTempo ? '<span class="text-[8px] bg-yellow-500 text-black px-2 py-1 rounded font-black">MELHOR</span>' : ''}
                </div>
            `).join('');
        }

        function getColor(vel) {
            if (vel > 60) return '#22c55e'; // Verde (Rápido)
            if (vel > 30) return '#eab308'; // Amarelo (Médio)
            return '#ef4444'; // Vermelho (Lento/Frenagem)
        }

        function renderMapa(pontos) {
            if (map) map.remove();
            const coords = pontos.map(p => [p.lat, p.lng]);
            map = L.map('map', { zoomControl: false }).setView(coords[0], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Desenha o rastro colorido (Heatmap)
            for (let i = 1; i < pontos.length; i++) {
                const p1 = pontos[i-1];
                const p2 = pontos[i];
                L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], {
                    color: getColor(parseFloat(p2.vel)),
                    weight: 5,
                    opacity: 0.8
                }).addTo(map);
            }

            marker = L.circleMarker(coords[0], { radius: 6, color: '#fff', fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            map.fitBounds(L.polyline(coords).getBounds());
        }

        window.compararVolta = function(idx) {
            document.querySelectorAll('.volta-item').forEach(el => el.classList.remove('ativa'));
            document.getElementById(`volta-${idx}`)?.classList.add('ativa');
            atualizarGrafico(idx);
        };

        window.mudarComparacao = function() {
            const val = document.getElementById('selectComparar').value;
            atualizarGrafico(0, val); // Compara volta atual com a referência
        };

        function atualizarGrafico(idx, tipoComp = null) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();

            const datasetPrincipal = {
                label: 'Sua Velocidade',
                data: dadosTreino.telemetria.map(p => p.vel),
                borderColor: '#eab308',
                borderWidth: 3,
                pointRadius: 0,
                tension: 0.3
            };

            const datasets = [datasetPrincipal];

            if (tipoComp === 'recorde' && recordeGlobal) {
                datasets.push({
                    label: 'Recorde da Pista',
                    data: recordeGlobal.telemetria.map(p => p.vel),
                    borderColor: 'rgba(255, 255, 255, 0.4)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0
                });
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dadosTreino.telemetria.map((_, i) => i),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#111' } }, x: { display: false } },
                    onHover: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            const p = dadosTreino.telemetria[i];
                            marker.setLatLng([p.lat, p.lng]);
                        }
                    }
                }
            });
        }

        // Funções de Expansão
        window.expandir = function(tipo) {
            const modal = document.getElementById('modalExp');
            const content = document.getElementById('modalContent');
            modal.classList.add('active');
            
            if (tipo === 'map') {
                content.innerHTML = '<div id="mapExp" class="w-full h-full"></div>';
                const mapExp = L.map('mapExp').setView(map.getCenter(), map.getZoom());
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapExp);
                // Desenha rastro no mapa expandido...
                renderMapa(dadosTreino.telemetria); // Reaproveita lógica
            } else {
                content.innerHTML = '<canvas id="chartExp"></canvas>';
                // Lógica para clonar gráfico grande...
            }
        };

        window.fecharModal = () => document.getElementById('modalExp').classList.remove('active');

        init();
    </script>
</body>
</html>
