<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; border-radius: 2rem; border: 1px solid #222; }
        @media screen and (orientation: portrait) {
            #app-container { transform: rotate(90deg); transform-origin: center; width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; translate: -50% -50%; }
        }
        .sector-table { border-collapse: separate; border-spacing: 0 4px; }
        .bg-bom { background-color: #dc2626 !important; color: white !important; } /* Vermelho */
        .bg-inter { background-color: #eab308 !important; color: black !important; } /* Amarelo */
        .text-ruim { color: #71717a !important; } /* Cinza */
        .row-selected { outline: 2px solid #fff; background-color: #111 !important; }
    </style>
</head>
<body>
    <div id="app-container" class="p-4 h-full flex flex-col gap-3">
        <div class="flex justify-between items-center bg-zinc-950 p-4 rounded-[2rem] border border-zinc-900 shadow-xl">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="bg-zinc-900 w-10 h-10 flex items-center justify-center rounded-xl text-zinc-400 text-xl font-bold">←</button>
                <div>
                    <h1 id="viewPista" class="text-white font-black italic uppercase text-lg leading-none tracking-tighter">CARREGANDO...</h1>
                    <p id="viewPiloto" class="text-zinc-600 text-[9px] font-bold uppercase mt-1">AGUARDE</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="baseComparacao" onchange="renderizarTabela()" class="bg-zinc-900 text-[10px] font-bold px-3 py-2 rounded-xl border border-zinc-800 text-white outline-none">
                    <option value="sessao">Comparar: Melhor Sessão</option>
                    <option value="pista">Comparar: Recorde Pista</option>
                </select>
                <button onclick="if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen();" class="bg-zinc-800 text-[10px] font-black px-4 py-2 rounded-xl text-yellow-500 uppercase">⛶</button>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-12 gap-3 overflow-hidden">
            <div class="col-span-7 bg-zinc-950 p-4 rounded-[2.5rem] border border-zinc-900 overflow-y-auto">
                <table class="w-full sector-table text-[11px]">
                    <thead>
                        <tr class="text-zinc-700 uppercase italic font-black text-[8px] text-center">
                            <th class="pb-3 text-left">LAP</th>
                            <th>S1</th><th>S2</th><th>S3</th><th>S4</th>
                            <th class="pb-3 text-right">TIME</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaVoltas" class="text-center font-mono font-bold"></tbody>
                </table>
            </div>
            <div class="col-span-5 h-full relative">
                <div id="map"></div>
                <div class="absolute bottom-4 left-4 right-4 bg-black/80 backdrop-blur-md p-3 rounded-2xl border border-white/10 z-[1000]">
                    <div class="grid grid-cols-3 gap-1 text-[7px] font-bold uppercase text-center">
                        <div class="text-red-600 font-black">● Bom</div>
                        <div class="text-yellow-500 font-black">● Médio</div>
                        <div class="text-zinc-500 font-black">● Ruim</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
