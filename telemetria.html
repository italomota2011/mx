<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        #map { height: 300px; width: 100%; border-radius: 24px; z-index: 1; border: 1px solid #222; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid #333; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 id="pilotoNome" class="text-xl font-black italic uppercase text-yellow-500">Telemetria</h1>
                <p id="infoTreino" class="text-[9px] text-zinc-500 font-bold uppercase italic tracking-widest">Carregando...</p>
            </div>
            <button onclick="history.back()" class="bg-zinc-900 px-4 py-2 rounded-xl text-[10px] font-bold">VOLTAR</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-2 rounded-[2.5rem]"><div id="map"></div></div>
                <div class="glass p-5 rounded-[2.5rem]"><canvas id="speedChart" height="150"></canvas></div>
            </div>
            <div class="space-y-6">
                <div class="glass rounded-[2rem] h-[400px] flex flex-col">
                    <div class="p-4 border-b border-zinc-800 text-[10px] font-black uppercase italic">Voltas da Sessão</div>
                    <div id="listaVoltas" class="p-2 overflow-y-auto custom-scroll flex-1 space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk66sWdmBuL9BDrJiamg1J2rw7QH6uYvU",
            authDomain: "mxlaptimer.firebaseapp.com",
            projectId: "mxlaptimer",
            storageBucket: "mxlaptimer.firebasestorage.app",
            messagingSenderId: "790485374192",
            appId: "1:790485374192:web:6e18d1863f4702b6be9e35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        const urlParams = new URLSearchParams(window.location.search);
        const treinoId = urlParams.get('id');

        async function carregar() {
            const snap = await getDoc(doc(db, "treinos", treinoId));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('pilotoNome').innerText = d.piloto;
                document.getElementById('infoTreino').innerText = `${d.pista} • ${new Date(d.data.seconds*1000).toLocaleDateString()}`;
                
                // Lista de Voltas
                const melhor = [...d.voltas].sort()[0];
                document.getElementById('listaVoltas').innerHTML = d.voltas.map((v, i) => `
                    <div class="flex justify-between p-3 rounded-xl bg-zinc-900/50 border ${v === melhor ? 'border-yellow-500' : 'border-zinc-800'}">
                        <span class="text-xs font-bold text-zinc-500 italic">${i+1}ª</span>
                        <span class="text-sm font-black font-mono ${v === melhor ? 'text-yellow-500' : 'text-white'}">${v}</span>
                    </div>
                `).join('');

                if (d.telemetria) {
                    const coords = d.telemetria.map(p => [p.lat, p.lng]);
                    const map = L.map('map', {zoomControl: false}).setView(coords[0], 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    for(let i=0; i<coords.length-1; i++) {
                        const v = d.telemetria[i].vel;
                        const cor = v > 40 ? '#22c55e' : (v < 15 ? '#ef4444' : '#facc15');
                        L.polyline([coords[i], coords[i+1]], {color: cor, weight: 6}).addTo(map);
                    }
                    map.fitBounds(coords);

                    new Chart(document.getElementById('speedChart'), {
                        type: 'line',
                        data: {
                            labels: d.telemetria.map(p => (p.ts/1000).toFixed(0)+'s'),
                            datasets: [{ data: d.telemetria.map(p => p.vel), borderColor: '#facc15', pointRadius: 0, fill: true, backgroundColor: 'rgba(250,204,21,0.05)' }]
                        },
                        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#111' } } } }
                    });
                }
            }
        }
        carregar();
    </script>
</body>
</html>
