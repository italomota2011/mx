<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; border-radius: 1.5rem; border: 1px solid #222; }
        
        @media screen and (orientation: portrait) {
            #app-container { 
                transform: rotate(90deg); transform-origin: center; 
                width: 100dvh; height: 100vw; 
                position: absolute; top: 50%; left: 50%; translate: -50% -50%; 
            }
        }

        .sector-table { border-collapse: separate; border-spacing: 0 4px; }
        
        /* CORES SOLICITADAS */
        .bg-bom { background-color: #dc2626 !important; color: white; border-radius: 4px; } /* Vermelho */
        .bg-medio { background-color: #eab308 !important; color: black; border-radius: 4px; } /* Amarelo */
        .text-ruim { color: #71717a !important; } /* Cinza */
        
        .row-selected { outline: 2px solid #eab308; background-color: #111 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
